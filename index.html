<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>8-Ball Fullscreen</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --gold: #eec27e; --felt: #1b7a2b; --wood: #5d3a1a; }
        body { 
            background: #000; color: white; font-family: sans-serif; 
            margin: 0; padding: 0; overflow: hidden; height: 100vh;
            display: flex; flex-direction: column;
        }
        #setup { 
            position: absolute; z-index: 10; width: 100%; height: 100%;
            background: rgba(15, 38, 26, 0.95); display: flex; 
            flex-direction: column; align-items: center; justify-content: center;
        }
        .id-box { font-size: 40px; font-weight: bold; color: var(--gold); margin: 10px 0; }
        canvas { 
            background: radial-gradient(circle, #239f30, #0a621a);
            border: 6px solid var(--wood); box-shadow: 0 0 20px rgba(0,0,0,0.5);
            width: 100vw; height: 50vw; max-height: 90vh; touch-action: none;
        }
        #status-bar { height: 40px; line-height: 40px; font-weight: bold; color: var(--gold); text-align: center; background: #163a2a; width: 100%; }
        .btn { background: var(--gold); color: #3e2e14; padding: 15px 30px; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; width: 80%; max-width: 300px; margin-top: 10px; }
        input { padding: 15px; border-radius: 8px; width: 80%; max-width: 300px; text-align: center; font-size: 20px; border: none; margin: 10px 0; }
    </style>
</head>
<body>

<div id="setup">
    <div style="font-size: 18px;">YOUR GAME CODE:</div>
    <div id="my-id" class="id-box">....</div>
    <input type="number" id="join-id" placeholder="Enter Friend's Code">
    <button class="btn" onclick="connect()">JOIN GAME</button>
</div>

<div id="status-bar">WAITING FOR CONNECTION...</div>
<canvas id="table" width="800" height="400"></canvas>
<div style="flex-grow: 1; display: flex; align-items: center; justify-content: center;">
    <button id="shoot-btn" class="btn" style="height: 70px; display: none;">🎯 SHOOT</button>
</div>

<script>
    const canvas = document.getElementById('table');
    const ctx = canvas.getContext('2d');
    const statusBar = document.getElementById('status-bar');
    const shootBtn = document.getElementById('shoot-btn');

    // Peer Connection
    const myShortId = Math.floor(1000 + Math.random() * 9000).toString();
    const peer = new Peer(myShortId);
    let conn = null, isMyTurn = false;

    peer.on('open', id => document.getElementById('my-id').innerText = id);
    peer.on('connection', c => { conn = c; isMyTurn = true; initGame(); });
    
    function connect() { 
        const id = document.getElementById('join-id').value;
        conn = peer.connect(id); 
        isMyTurn = false; initGame(); 
    }

    function initGame() {
        conn.on('open', () => {
            document.getElementById('setup').style.display = 'none';
            shootBtn.style.display = 'block';
            updateTurnText();
        });
        conn.on('data', data => {
            if(data.type === 'SHOT') {
                balls[0].vx = data.vx; balls[0].vy = data.vy;
                isMyTurn = true; updateTurnText();
            }
        });
    }

    function updateTurnText() { statusBar.innerText = isMyTurn ? "★ YOUR TURN ★" : "OPPONENT'S TURN"; }

    // Game Objects
    const BALL_R = 11;
    let balls = [];
    const pockets = [{x:0,y:0},{x:400,y:0},{x:800,y:0},{x:0,y:400},{x:400,y:400},{x:800,y:400}];

    function setupRack() {
        balls = [{ x: 200, y: 200, vx: 0, vy: 0, color: 'white' }]; // Cue Ball
        let xStart = 550, yStart = 200, spacing = 24;
        for(let col=0; col<5; col++) {
            for(let row=0; row<=col; row++) {
                let color = (col === 2 && row === 1) ? 'black' : ( (col+row) % 2 === 0 ? '#ff3e3e' : '#ffea00');
                balls.push({ x: xStart + (col * 20), y: yStart + (row * spacing) - (col * spacing/2), vx:0, vy:0, color: color });
            }
        }
    }
    setupRack();

    // Interaction
    let aim = { active: false, x: 0, y: 0 };
    canvas.addEventListener('touchstart', e => { if(isMyTurn) aim.active = true; e.preventDefault(); }, {passive: false});
    canvas.addEventListener('touchmove', e => {
        if(!aim.active) return;
        const r = canvas.getBoundingClientRect();
        aim.x = (e.touches[0].clientX - r.left) * (800 / r.width);
        aim.y = (e.touches[0].clientY - r.top) * (400 / r.height);
        e.preventDefault();
    }, {passive: false});

    shootBtn.onclick = () => {
        if(!aim.active || !isMyTurn) return;
        const dx = aim.x - balls[0].x, dy = aim.y - balls[0].y;
        const dist = Math.hypot(dx, dy);
        const vx = (dx / dist) * 16, vy = (dy / dist) * 16;
        balls[0].vx = vx; balls[0].vy = vy;
        if(conn) conn.send({ type: 'SHOT', vx, vy });
        isMyTurn = false; aim.active = false; updateTurnText();
    };

    function gameLoop() {
        ctx.clearRect(0,0,800,400);
        
        // Pockets
        ctx.fillStyle = '#000';
        pockets.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 25, 0, 7); ctx.fill(); });

        balls.forEach((b, i) => {
            b.x += b.vx; b.y += b.vy; b.vx *= 0.985; b.vy *= 0.985;

            // Bounce
            if(b.x < BALL_R || b.x > 800-BALL_R) b.vx *= -0.8;
            if(b.y < BALL_R || b.y > 400-BALL_R) b.vy *= -0.8;

            // Collision
            for(let j=i+1; j<balls.length; j++) {
                let b2 = balls[j];
                let dx = b2.x - b.x, dy = b2.y - b.y;
                if(Math.hypot(dx, dy) < BALL_R*2) {
                    let angle = Math.atan2(dy, dx);
                    let tx = b.vx; b.vx = b2.vx; b2.vx = tx;
                    let ty = b.vy; b.vy = b2.vy; b2.vy = ty;
                }
            }

            // Pocketing
            pockets.forEach(p => {
                if(Math.hypot(b.x-p.x, b.y-p.y) < 25) {
                    if(i === 0) { b.x=200; b.y=200; b.vx=0; b.vy=0; }
                    else { b.x = -100; b.vx=0; b.vy=0; }
                }
            });

            ctx.fillStyle = b.color;
            ctx.beginPath(); ctx.arc(b.x, b.y, BALL_R, 0, 7); ctx.fill();
            ctx.strokeStyle = "rgba(0,0,0,0.3)"; ctx.stroke();
        });

        if(aim.active && isMyTurn) {
            ctx.strokeStyle = "white"; ctx.setLineDash([5, 5]);
            ctx.beginPath(); ctx.moveTo(balls[0].x, balls[0].y); ctx.lineTo(aim.x, aim.y); ctx.stroke();
            ctx.setLineDash([]);
        }
        requestAnimationFrame(gameLoop);
    }
    gameLoop();
</script>
</body>
</html>

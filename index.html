<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate P2P Hub</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --gold: #eec27e; --bg: #0d1117; --card: #161b22; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; height: 100vh; }
        
        /* Navigation & Lobby */
        #lobby, #hub { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: var(--card); border: 1px solid #30363d; padding: 25px; border-radius: 12px; cursor: pointer; text-align: center; width: 130px; }
        .card:hover { border-color: var(--gold); }
        
        /* Game Viewport */
        #stage { display: none; width: 100%; height: 100%; flex-direction: column; }
        .bar { padding: 10px; background: #161b22; display: flex; justify-content: space-between; border-bottom: 2px solid var(--gold); }
        #view { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: #000; overflow: auto; }
        
        /* Game Components */
        canvas { background: #1b7a2b; border: 8px solid #5d3a1a; border-radius: 10px; max-width: 90vw; }
        .board { display: grid; border: 5px solid #333; }
        .sq { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; cursor: pointer; }
        .lt { background: #f0d9b5; } .dk { background: #b58863; }
        .ttt-sq { width: 90px; height: 90px; background: #222; border: 1px solid #444; display: flex; align-items: center; justify-content: center; font-size: 3rem; }
        .selected { background: #bbcb2b !important; }
    </style>
</head>
<body>

<div id="lobby">
    <h1 style="color: var(--gold)">GAMER HUB</h1>
    <div id="my-id" style="font-size: 2.5rem; font-weight: bold; margin-bottom: 10px;">...</div>
    <input type="number" id="join-id" style="padding:12px; border-radius:8px; border:none; width: 200px;" placeholder="Friend's Code">
    <button onclick="connect()" style="margin-top:15px; padding:12px 25px; background:var(--gold); border:none; border-radius:8px; font-weight:bold; cursor:pointer;">START ENGINE</button>
</div>

<div id="hub" style="display:none;">
    <h2 style="color: var(--gold)">SELECT ARENA</h2>
    <div class="game-grid">
        <div class="card" onclick="req('pool')">🎱 POOL</div>
        <div class="card" onclick="req('chess')">♟ CHESS</div>
        <div class="card" onclick="req('checkers')">🏁 CHECKERS</div>
        <div class="card" onclick="req('ttt')">❌ TIC-TAC-TOE</div>
    </div>
</div>

<div id="stage">
    <div class="bar">
        <button onclick="exit()" style="background:none; color:white; border:1px solid #444; padding:5px 10px; cursor:pointer;">EXIT TO HUB</button>
        <div id="status" style="color:var(--gold); font-weight:bold;">WAITING...</div>
    </div>
    <div id="view"></div>
</div>

<script>
    let peer, conn, myRole, isMyTurn, curG;
    const sid = Math.floor(1000 + Math.random()*9000).toString();
    peer = new Peer(sid);
    peer.on('open', id => document.getElementById('my-id').innerText = id);
    peer.on('connection', c => { conn = c; myRole='w'; isMyTurn=true; setup(); });

    function connect() { 
        conn = peer.connect(document.getElementById('join-id').value); 
        myRole='b'; isMyTurn=false; setup(); 
    }

    function setup() {
        conn.on('open', () => { lobby.style.display='none'; hub.style.display='flex'; });
        conn.on('data', d => {
            if(d.type==='SET') load(d.val);
            if(d.type==='ACT') handle(d);
        });
    }

    function req(g) { conn.send({type:'SET', val:g}); load(g); }
    function exit() { stage.style.display='none'; hub.style.display='flex'; curG=''; }

    function load(g) {
        hub.style.display='none'; stage.style.display='flex';
        curG = g; document.getElementById('view').innerHTML = '';
        if(g==='pool') initPool();
        if(g==='chess' || g==='checkers') initBoard(g);
        if(g==='ttt') initTTT();
        refresh();
    }

    function initTTT() {
        const wrap = document.createElement('div'); wrap.style.display='grid'; wrap.style.gridTemplateColumns='repeat(3,90px)';
        for(let i=0; i<9; i++) {
            const s = document.createElement('div'); s.className='ttt-sq'; s.id='t'+i;
            s.onclick = () => { if(isMyTurn && s.innerText==='') {
                s.innerText = myRole==='w'?'X':'O'; isMyTurn=false; refresh();
                conn.send({type:'ACT', g:'ttt', i, val:s.innerText});
            }};
            wrap.appendChild(s);
        }
        document.getElementById('view').appendChild(wrap);
    }

    function initBoard(type) {
        const wrap = document.createElement('div'); wrap.className='board'; wrap.style.gridTemplateColumns='repeat(8,45px)';
        for(let i=0; i<64; i++) {
            const s = document.createElement('div'); s.className=`sq ${(Math.floor(i/8)+i)%2===0?'lt':'dk'}`; s.id='s'+i;
            s.onclick = () => { if(isMyTurn) {
                document.querySelectorAll('.sq').forEach(x=>x.classList.remove('selected'));
                s.classList.add('selected'); isMyTurn=false; refresh();
                conn.send({type:'ACT', g:type, i});
            }};
            wrap.appendChild(s);
        }
        document.getElementById('view').appendChild(wrap);
    }

    function initPool() {
        document.getElementById('view').innerHTML = '<canvas id="pc" width="800" height="400"></canvas>';
        const can = document.getElementById('pc'), ctx = can.getContext('2d');
        let balls = [{x:400,y:200,vx:0,vy:0,c:'#fff'}];
        can.onclick = () => { if(isMyTurn) { balls[0].vx=10; isMyTurn=false; refresh(); conn.send({type:'ACT', g:'pool', b:balls}); }};
        function loop() {
            if(curG!=='pool') return;
            ctx.clearRect(0,0,800,400);
            balls.forEach(b => {
                b.x+=b.vx; b.vx*=0.98; if(b.x<10||b.x>790) b.vx*=-1;
                ctx.fillStyle=b.c; ctx.beginPath(); ctx.arc(b.x,b.y,12,0,7); ctx.fill();
            });
            requestAnimationFrame(loop);
        }
        loop();
    }

    function handle(d) {
        isMyTurn = true; refresh();
        if(d.g==='ttt') document.getElementById('t'+d.i).innerText = d.val;
        if(d.g==='chess'||d.g==='checkers') {
            document.querySelectorAll('.sq').forEach(x=>x.classList.remove('selected'));
            document.getElementById('s'+d.i).classList.add('selected');
        }
    }

    function refresh() { document.getElementById('status').innerText = isMyTurn ? "★ YOUR TURN ★" : "OPPONENT'S TURN"; }
</script>
</body>
</html>

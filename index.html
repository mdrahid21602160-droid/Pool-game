<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>8-Ball Pro Mobile</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --gold: #eec27e; --felt: #1b7a2b; --wood: #7b5e38; }
        * { user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body {
            background: #0f261a; margin: 0; display: flex; flex-direction: column;
            align-items: center; font-family: -apple-system, sans-serif; height: 100vh; 
            overflow: hidden; touch-action: none; color: white;
        }
        .menu-card {
            background: #163a2a; border: 2px solid var(--gold); border-radius: 15px;
            padding: 20px; width: 90%; max-width: 400px; margin-top: 20px; text-align: center;
        }
        .id-display {
            font-size: 32px; font-weight: bold; background: #000; color: #fff;
            padding: 10px; border-radius: 8px; display: inline-block; margin: 10px 0;
            letter-spacing: 4px; border: 1px solid var(--gold);
        }
        canvas {
            background: radial-gradient(circle, #239f30, #0a621a);
            border: 8px solid var(--wood); border-radius: 15px;
            width: 95%; height: auto; margin-top: 10px; display: none;
        }
        .btn {
            background: var(--gold); color: #3e2e14; padding: 15px; border: none;
            border-radius: 8px; font-weight: bold; font-size: 18px; width: 100%; cursor: pointer;
        }
        input {
            padding: 15px; border-radius: 8px; border: none; width: 100%;
            font-size: 20px; text-align: center; margin: 10px 0; background: #fff; color: #000;
        }
        #status { color: var(--gold); font-weight: bold; margin: 10px; text-transform: uppercase; }
        .foul-alert { animation: flash 1s infinite; color: #ff4757; }
        @keyframes flash { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div id="login-screen" class="menu-card">
        <div>YOUR GAME CODE</div>
        <div class="id-display" id="my-id">....</div>
        <p id="net-status">CONNECTING TO SERVER...</p>
        <hr style="opacity:0.2; margin: 20px 0;">
        <input type="number" id="join-id" placeholder="ENTER 4-DIGIT CODE" pattern="\d*">
        <button class="btn" onclick="connect()">JOIN FRIEND</button>
    </div>

    <div id="game-ui" style="display:none; width:100%; text-align:center;">
        <div id="status">YOUR TURN</div>
        <canvas id="poolTable" width="800" height="400"></canvas>
        <button id="shootBtn" class="btn" style="width:80%; margin-top:15px;">🎯 SHOOT</button>
    </div>

<script>
    const canvas = document.getElementById('poolTable');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const shootBtn = document.getElementById('shootBtn');

    // Generate 4-digit ID
    const myShortId = Math.floor(1000 + Math.random() * 9000).toString();
    const peer = new Peer(myShortId);
    let conn = null;
    let isMyTurn = false;
    let ballInHand = false;

    peer.on('open', id => {
        document.getElementById('my-id').innerText = id;
        document.getElementById('net-status').innerText = "READY TO CONNECT";
    });

    peer.on('error', () => location.reload()); // Simple fix for ID collisions

    peer.on('connection', c => {
        conn = c;
        isMyTurn = true;
        start();
    });

    function connect() {
        const id = document.getElementById('join-id').value;
        if(id.length !== 4) return alert("Enter 4 numbers");
        conn = peer.connect(id);
        isMyTurn = false;
        start();
    }

    function start() {
        conn.on('open', () => {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            canvas.style.display = 'block';
            updateUI();
        });
        conn.on('data', data => {
            if(data.type === 'SHOT') {
                balls[0].vx = data.vx; balls[0].vy = data.vy;
                isMyTurn = true;
            } else if(data.type === 'FOUL') {
                ballInHand = true; isMyTurn = true;
            }
            updateUI();
        });
    }

    function updateUI() {
        if (ballInHand) {
            statusEl.innerText = "FOUL! DRAG WHITE BALL";
            statusEl.className = "foul-alert";
        } else {
            statusEl.innerText = isMyTurn ? "YOUR TURN" : "FRIEND'S TURN";
            statusEl.className = "";
        }
        shootBtn.disabled = !isMyTurn || ballInHand;
    }

    // Physics & Balls
    let balls = [{ x: 200, y: 200, vx: 0, vy: 0, color: 'white' }];
    for(let i=0; i<5; i++) balls.push({x: 500+i*15, y: 150+i*20, vx:0, vy:0, color: 'gold'});

    let aim = { active: false, x: 0, y: 0 };

    canvas.addEventListener('touchstart', e => {
        if(!isMyTurn) return;
        aim.active = true;
    }, {passive: false});

    canvas.addEventListener('touchmove', e => {
        if(!aim.active) return;
        const r = canvas.getBoundingClientRect();
        const tx = (e.touches[0].clientX - r.left) * (800 / r.width);
        const ty = (e.touches[0].clientY - r.top) * (400 / r.height);

        if (ballInHand) {
            balls[0].x = tx; balls[0].y = ty;
        } else {
            aim.x = tx; aim.y = ty;
        }
        e.preventDefault();
    }, {passive: false});

    canvas.addEventListener('touchend', () => {
        if (ballInHand) {
            ballInHand = false;
            updateUI();
        }
    });

    shootBtn.onclick = () => {
        const dx = aim.x - balls[0].x, dy = aim.y - balls[0].y;
        const dist = Math.hypot(dx, dy);
        const vx = (dx / dist) * 12, vy = (dy / dist) * 12;
        balls[0].vx = vx; balls[0].vy = vy;
        if(conn) conn.send({type: 'SHOT', vx, vy});
        isMyTurn = false; aim.active = false;
        updateUI();
    };

    function loop() {
        ctx.clearRect(0, 0, 800, 400);
        balls.forEach(b => {
            b.x += b.vx; b.y += b.vy; b.vx *= 0.985; b.vy *= 0.985;
            if(b.x < 12 || b.x > 788) b.vx *= -1;
            if(b.y < 12 || b.y > 388) b.vy *= -1;
            
            // Basic Scratch Logic
            if(b.color === 'white' && (b.x < 15 && b.y < 15)) { // Pocket simulation
                b.x = 200; b.y = 200; b.vx = 0; b.vy = 0;
                if(conn) conn.send({type: 'FOUL'});
            }

            ctx.fillStyle = b.color; ctx.beginPath(); ctx.arc(b.x, b.y, 12, 0, 7); ctx.fill();
        });

        if(aim.active && isMyTurn && !ballInHand) {
            ctx.strokeStyle = "white"; ctx.setLineDash([5, 5]);
            ctx.beginPath(); ctx.moveTo(balls[0].x, balls[0].y); ctx.lineTo(aim.x, aim.y); ctx.stroke();
            ctx.setLineDash([]);
        }
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>

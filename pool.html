<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Pool P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --gold: #eec27e;
            --dark: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --felt: #1a4d2e;
            --felt-dark: #0f2e1b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--dark);
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        #setup {
            position: fixed;
            inset: 0;
            background: rgba(13, 17, 23, 0.98);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .setup-content {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: var(--gold);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .subtitle { color: #8b949e; margin-bottom: 30px; }

        .code-display {
            font-family: 'SF Mono', monospace;
            background: #000;
            color: var(--gold);
            padding: 20px 40px;
            border-radius: 12px;
            letter-spacing: 8px;
            font-size: 2.2rem;
            border: 2px solid var(--gold);
            margin: 20px 0;
            font-weight: bold;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }

        input {
            padding: 15px;
            text-align: center;
            border-radius: 10px;
            background: #111;
            color: white;
            border: 1px solid var(--border);
            font-size: 1.2rem;
        }

        input:focus { outline: none; border-color: var(--gold); }

        .btn {
            background: var(--gold);
            color: #3e2e14;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(238, 194, 126, 0.3);
        }

        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-secondary {
            background: transparent;
            color: #8b949e;
            border: 1px solid var(--border);
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(238, 194, 126, 0.2);
            border-radius: 50%;
            border-top-color: var(--gold);
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #game-ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--card);
            padding: 15px 20px;
            border-bottom: 2px solid var(--gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            font-size: 0.95rem;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .player-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .player-badge.active {
            box-shadow: 0 0 20px var(--gold);
            border: 2px solid var(--gold);
            transform: scale(1.05);
        }

        .solid { background: #d32f2f; color: white; }
        .stripe { background: #ffeb3b; color: #333; }

        #turn-indicator {
            font-weight: 700;
            color: var(--gold);
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #canvas-container {
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, var(--felt) 0%, var(--felt-dark) 100%);
        }

        canvas {
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            border-radius: 8px;
            cursor: crosshair;
            touch-action: none;
        }

        #power-meter {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 12px;
            background: rgba(0,0,0,0.6);
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid var(--gold);
            z-index: 20;
            display: none;
        }

        #power-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4caf50, #ffeb3b, #f44336);
            transition: width 0.016s linear;
        }

        #end-screen {
            position: fixed;
            inset: 0;
            background: rgba(13, 17, 23, 0.95);
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #end-screen h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
        }

        .score-display {
            font-size: 1.5rem;
            color: #8b949e;
            margin-bottom: 30px;
            text-align: center;
            line-height: 1.6;
        }

        #latency-display {
            position: fixed;
            top: 80px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.85rem;
            color: #00ff00;
            z-index: 50;
            display: none;
        }

        .error-toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #da3633;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            z-index: 200;
            display: none;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { transform: translateX(-50%) translateY(-20px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .code-display { font-size: 1.8rem; padding: 15px 30px; }
        }
    </style>
</head>
<body>
    <div id="setup">
        <div class="setup-content">
            <h1>🎱 Pro Pool</h1>
            <p class="subtitle">8-Ball rules. Sink your balls, then the 8-ball.</p>

            <div id="my-id"><span class="spinner"></span></div>

            <div class="input-group">
                <input type="text" id="join-id" placeholder="Enter 4-digit code" maxlength="4">
                <button class="btn" id="join-btn" onclick="connect()" disabled>Join Match</button>
                <button class="btn btn-secondary" onclick="startSolo()">Practice Solo</button>
            </div>
        </div>
    </div>

    <div class="error-toast" id="error"></div>
    <div id="latency-display">Ping: --ms</div>

    <div id="game-ui">
        <div class="player-info">
            <div class="player-badge" id="p1-badge">P1</div>
        </div>
        <div id="turn-indicator">Waiting...</div>
        <div class="player-info">
            <div class="player-badge" id="p2-badge">P2</div>
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="table"></canvas>
    </div>

    <div id="power-meter"><div id="power-fill"></div></div>

    <div id="end-screen">
        <h1 id="end-title">Game Over</h1>
        <div class="score-display" id="end-msg"></div>
        <button class="btn" onclick="location.reload()">Play Again</button>
    </div>

    <script>
        // ==========================================
        // CONSTANTS - Physics & Game
        // ==========================================
        const TABLE_WIDTH = 800;
        const TABLE_HEIGHT = 400;
        const BALL_RADIUS = 11;
        const BALL_DIAMETER = BALL_RADIUS * 2;
        const POCKET_RADIUS = 28;
        const MAX_POWER = 25;
        const FRICTION_COEFF = 0.985;
        const ROLLING_FRICTION = 0.99;
        const STOP_THRESHOLD = 0.05;
        const SPIN_DECAY = 0.98;
        const PHYSICS_FPS = 120;
        const PHYSICS_DT = 1000 / PHYSICS_FPS;

        const POCKETS = [
            {x: 0, y: 0}, {x: TABLE_WIDTH/2, y: 0}, {x: TABLE_WIDTH, y: 0},
            {x: 0, y: TABLE_HEIGHT}, {x: TABLE_WIDTH/2, y: TABLE_HEIGHT}, {x: TABLE_WIDTH, y: TABLE_HEIGHT}
        ];

        // ==========================================
        // STATE MANAGEMENT
        // ==========================================
        const state = {
            balls: [],
            cueBall: null,
            eightBall: null,

            // Game flow
            isMyTurn: false,
            isHost: false,
            isSolo: false,
            myType: null,
            opponentType: null,
            assignedType: false,
            gameActive: false,
            gameEnded: false,
            winner: null,

            // Physics
            physicsTime: 0,
            accumulator: 0,
            lastFrameTime: 0,

            // Input
            isDragging: false,
            dragStart: null,
            dragCurrent: null,
            canShoot: true,

            // Networking
            peer: null,
            conn: null,
            myId: null,
            latency: 0,
            lastPingTime: 0,
            pendingShot: null,
            shotQueue: [],

            // Synchronization
            authoritativeState: null,
            syncSequence: 0,
            lastSyncTime: 0
        };

        const canvas = document.getElementById('table');
        const ctx = canvas.getContext('2d', { alpha: false });

        // ==========================================
        // VECTOR MATH (100% accurate)
        // ==========================================
        class Vector2 {
            constructor(x = 0, y = 0) {
                this.x = x;
                this.y = y;
            }

            clone() { return new Vector2(this.x, this.y); }

            add(v) { return new Vector2(this.x + v.x, this.y + v.y); }
            sub(v) { return new Vector2(this.x - v.x, this.y - v.y); }
            mul(s) { return new Vector2(this.x * s, this.y * s); }

            dot(v) { return this.x * v.x + this.y * v.y; }
            cross(v) { return this.x * v.y - this.y * v.x; }

            length() { return Math.sqrt(this.x * this.x + this.y * this.y); }
            lengthSq() { return this.x * this.x + this.y * this.y; }

            normalize() {
                const len = this.length();
                if (len === 0) return new Vector2(0, 0);
                return new Vector2(this.x / len, this.y / len);
            }

            rotate(angle) {
                const cos = Math.cos(angle);
                const sin = Math.sin(angle);
                return new Vector2(
                    this.x * cos - this.y * sin,
                    this.x * sin + this.y * cos
                );
            }

            dist(v) { return Math.sqrt((this.x - v.x) ** 2 + (this.y - v.y) ** 2); }
            distSq(v) { return (this.x - v.x) ** 2 + (this.y - v.y) ** 2; }
        }

        // ==========================================
        // BALL CLASS - Proper physics
        // ==========================================
        class Ball {
            constructor(x, y, color, type, number) {
                this.pos = new Vector2(x, y);
                this.vel = new Vector2(0, 0);
                this.oldPos = new Vector2(x, y);

                this.color = color;
                this.type = type; // 'cue', 'solid', 'stripe', 'eight'
                this.number = number;
                this.radius = BALL_RADIUS;
                this.mass = 1;
                this.potted = false;

                // Spin (English) - affects ball movement
                this.spin = new Vector2(0, 0); // Top/back spin, left/right
                this.angularVel = 0;

                this.id = number || 0;
            }

            get speed() { return this.vel.length(); }
            get moving() { return this.speed > STOP_THRESHOLD; }

            // Verlet integration for stability
            update(dt) {
                if (this.potted) return;

                // Apply friction based on velocity and spin
                const speed = this.speed;
                if (speed > 0) {
                    // Sliding friction
                    let friction = Math.pow(FRICTION_COEFF, speed * dt * 60);

                    // Rolling friction when slow
                    if (speed < 2) {
                        friction *= ROLLING_FRICTION;
                    }

                    this.vel = this.vel.mul(friction);

                    // Apply spin effect (simplified Magnus effect)
                    const spinEffect = this.spin.mul(0.1 * dt * 60);
                    this.vel = this.vel.add(spinEffect);

                    // Decay spin
                    this.spin = this.spin.mul(SPIN_DECAY);
                    this.angularVel *= SPIN_DECAY;
                }

                // Stop if very slow
                if (this.speed < STOP_THRESHOLD) {
                    this.vel = new Vector2(0, 0);
                    this.spin = new Vector2(0, 0);
                    this.angularVel = 0;
                }

                // Update position
                this.oldPos = this.pos.clone();
                this.pos = this.pos.add(this.vel.mul(dt * 60)); // Scale to pixels/frame

                // Wall collisions with restitution
                const restitution = 0.85;

                if (this.pos.x - this.radius < 0) {
                    this.pos.x = this.radius;
                    this.vel.x = Math.abs(this.vel.x) * restitution;
                    this.applyWallFriction(new Vector2(1, 0));
                }
                if (this.pos.x + this.radius > TABLE_WIDTH) {
                    this.pos.x = TABLE_WIDTH - this.radius;
                    this.vel.x = -Math.abs(this.vel.x) * restitution;
                    this.applyWallFriction(new Vector2(-1, 0));
                }
                if (this.pos.y - this.radius < 0) {
                    this.pos.y = this.radius;
                    this.vel.y = Math.abs(this.vel.y) * restitution;
                    this.applyWallFriction(new Vector2(0, 1));
                }
                if (this.pos.y + this.radius > TABLE_HEIGHT) {
                    this.pos.y = TABLE_HEIGHT - this.radius;
                    this.vel.y = -Math.abs(this.vel.y) * restitution;
                    this.applyWallFriction(new Vector2(0, -1));
                }
            }

            applyWallFriction(normal) {
                // Transfer some velocity to spin on wall hit
                const tangent = new Vector2(-normal.y, normal.x);
                const tangentVel = this.vel.dot(tangent);
                this.spin = this.spin.add(tangent.mul(tangentVel * 0.3));
                this.vel = this.vel.sub(tangent.mul(tangentVel * 0.2));
            }

            // Continuous collision detection
            sweepAgainst(other, dt) {
                if (this.potted || other.potted) return false;

                const relativeVel = this.vel.sub(other.vel);
                const relativePos = this.pos.sub(other.pos);
                const radiusSum = this.radius + other.radius;

                // Quadratic equation for intersection
                const a = relativeVel.lengthSq();
                const b = 2 * relativePos.dot(relativeVel);
                const c = relativePos.lengthSq() - radiusSum * radiusSum;

                const discriminant = b * b - 4 * a * c;

                if (discriminant < 0 || a === 0) return false;

                const t = (-b - Math.sqrt(discriminant)) / (2 * a);

                if (t >= 0 && t <= dt * 60) {
                    // Move to collision point
                    this.pos = this.pos.add(this.vel.mul(t));
                    other.pos = other.pos.add(other.vel.mul(t));
                    return true;
                }

                return false;
            }

            resolveCollision(other) {
                const normal = this.pos.sub(other.pos).normalize();
                const relativeVel = this.vel.sub(other.vel);
                const velAlongNormal = relativeVel.dot(normal);

                if (velAlongNormal > 0) return; // Moving apart

                // Elastic collision with energy conservation
                const restitution = 0.95;
                const j = -(1 + restitution) * velAlongNormal / (1/this.mass + 1/other.mass);

                const impulse = normal.mul(j);
                this.vel = this.vel.add(impulse.mul(1/this.mass));
                other.vel = other.vel.sub(impulse.mul(1/other.mass));

                // Friction/tangent impulse for spin transfer
                const tangent = new Vector2(-normal.y, normal.x);
                const velAlongTangent = relativeVel.dot(tangent);
                const frictionImpulse = tangent.mul(-velAlongTangent * 0.3);

                this.vel = this.vel.add(frictionImpulse);
                other.vel = other.vel.sub(frictionImpulse);

                // Transfer spin
                const spinTransfer = normal.mul(this.spin.sub(other.spin).dot(normal) * 0.5);
                this.spin = this.spin.sub(spinTransfer);
                other.spin = other.spin.add(spinTransfer);

                // Separate overlapping balls
                const overlap = (this.radius + other.radius) - this.pos.dist(other.pos);
                if (overlap > 0) {
                    const separation = normal.mul(overlap / 2 + 0.1);
                    this.pos = this.pos.add(separation);
                    other.pos = other.pos.sub(separation);
                }
            }

            draw(ctx) {
                if (this.potted) return;

                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.beginPath();
                ctx.arc(this.pos.x + 3, this.pos.y + 3, this.radius, 0, Math.PI * 2);
                ctx.fill();

                // Ball gradient based on light source
                const grad = ctx.createRadialGradient(
                    this.pos.x - this.radius * 0.3,
                    this.pos.y - this.radius * 0.3,
                    0,
                    this.pos.x,
                    this.pos.y,
                    this.radius
                );

                if (this.type === 'cue') {
                    grad.addColorStop(0, '#ffffff');
                    grad.addColorStop(0.7, '#e0e0e0');
                    grad.addColorStop(1, '#b0b0b0');
                } else if (this.type === 'eight') {
                    grad.addColorStop(0, '#444444');
                    grad.addColorStop(0.5, '#222222');
                    grad.addColorStop(1, '#000000');
                } else {
                    grad.addColorStop(0, this.lighten(this.color, 40));
                    grad.addColorStop(0.4, this.color);
                    grad.addColorStop(1, this.darken(this.color, 30));
                }

                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(this.pos.x, this.pos.y, this.radius, 0, Math.PI * 2);
                ctx.fill();

                // Stripe for striped balls
                if (this.type === 'stripe') {
                    ctx.save();
                    ctx.translate(this.pos.x, this.pos.y);
                    // Rotate based on spin
                    ctx.rotate(this.angularVel * 0.5);

                    ctx.fillStyle = 'rgba(255,255,255,0.95)';
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius * 0.65, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius * 0.45, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }

                // Number circle
                if (this.number && this.type !== 'cue') {
                    ctx.fillStyle = 'rgba(255,255,255,0.9)';
                    ctx.beginPath();
                    ctx.arc(this.pos.x, this.pos.y, this.radius * 0.5, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = this.type === 'eight' ? 'white' : 'black';
                    ctx.font = `bold ${this.radius}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.number, this.pos.x, this.pos.y + 1);
                }

                // Specular highlight
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.beginPath();
                ctx.arc(
                    this.pos.x - this.radius * 0.35,
                    this.pos.y - this.radius * 0.35,
                    this.radius * 0.25,
                    0,
                    Math.PI * 2
                );
                ctx.fill();
            }

            lighten(color, percent) {
                const num = parseInt(color.replace("#",""), 16);
                const amt = Math.round(2.55 * percent);
                const R = Math.min(255, (num >> 16) + amt);
                const G = Math.min(255, ((num >> 8) & 0x00FF) + amt);
                const B = Math.min(255, (num & 0x0000FF) + amt);
                return "#" + (0x1000000 + R*0x10000 + G*0x100 + B).toString(16).slice(1);
            }

            darken(color, percent) {
                return this.lighten(color, -percent);
            }

            serialize() {
                return {
                    id: this.id,
                    x: this.pos.x,
                    y: this.pos.y,
                    vx: this.vel.x,
                    vy: this.vel.y,
                    sx: this.spin.x,
                    sy: this.spin.y,
                    potted: this.potted
                };
            }

            deserialize(data) {
                this.pos = new Vector2(data.x, data.y);
                this.vel = new Vector2(data.vx, data.vy);
                this.spin = new Vector2(data.sx || 0, data.sy || 0);
                this.potted = data.potted;
            }
        }

        // ==========================================
        // PHYSICS ENGINE
        // ==========================================
        const Physics = {
            step(dt) {
                const balls = state.balls;
                const steps = 4; // Sub-steps for stability
                const subDt = dt / steps;

                for (let step = 0; step < steps; step++) {
                    // Update positions
                    balls.forEach(ball => ball.update(subDt));

                    // Check collisions (multiple passes for stability)
                    for (let pass = 0; pass < 3; pass++) {
                        for (let i = 0; i < balls.length; i++) {
                            for (let j = i + 1; j < balls.length; j++) {
                                const b1 = balls[i];
                                const b2 = balls[j];

                                if (b1.potted || b2.potted) continue;

                                const distSq = b1.pos.distSq(b2.pos);
                                const minDist = b1.radius + b2.radius;

                                if (distSq < minDist * minDist) {
                                    b1.resolveCollision(b2);
                                }
                            }
                        }
                    }
                }

                // Check pockets after all physics steps
                this.checkPockets();
            },

            checkPockets() {
                state.balls.forEach(ball => {
                    if (ball.potted) return;

                    for (const pocket of POCKETS) {
                        const pocketPos = new Vector2(pocket.x, pocket.y);
                        const dist = ball.pos.dist(pocketPos);

                        if (dist < POCKET_RADIUS - 2) {
                            ball.potted = true;
                            ball.vel = new Vector2(0, 0);
                            handleBallPotted(ball);
                            break;
                        }
                    }
                });
            },

            anyMoving() {
                return state.balls.some(b => !b.potted && b.moving);
            }
        };

        // ==========================================
        // GAME LOGIC
        // ==========================================
        function initRack() {
            state.balls = [];

            // Cue ball in kitchen (left side)
            state.cueBall = new Ball(150, TABLE_HEIGHT/2, '#ffffff', 'cue', 0);
            state.balls.push(state.cueBall);

            // Rack formation
            const startX = 600;
            const startY = TABLE_HEIGHT/2;
            const spacing = BALL_RADIUS * Math.sqrt(3);

            const colors = [
                '#f44336', '#ff9800', '#ffeb3b', '#4caf50', 
                '#2196f3', '#3f51b5', '#9c27b0', '#795548'
            ];

            let ballIndex = 0;
            for (let row = 0; row < 5; row++) {
                for (let col = 0; col <= row; col++) {
                    const x = startX + row * spacing;
                    const y = startY + (col - row/2) * BALL_DIAMETER;

                    if (row === 2 && col === 1) {
                        // 8-ball in center
                        state.eightBall = new Ball(x, y, '#000000', 'eight', 8);
                        state.balls.push(state.eightBall);
                    } else {
                        const isSolid = ballIndex % 2 === 0;
                        const type = isSolid ? 'solid' : 'stripe';
                        const color = colors[Math.floor(ballIndex/2) % colors.length];
                        const number = isSolid ? (Math.floor(ballIndex/2) + 1) : (Math.floor(ballIndex/2) + 9);
                        state.balls.push(new Ball(x, y, color, type, number));
                        ballIndex++;
                    }
                }
            }
        }

        function handleBallPotted(ball) {
            if (state.gameEnded) return;

            // Handle cue ball scratch
            if (ball.type === 'cue') {
                handleCueBallPotted();
                return;
            }

            // First ball potted determines types
            if (!state.assignedType && !state.isSolo && ball.type !== 'eight') {
                if (state.isMyTurn) {
                    state.myType = ball.type;
                    state.opponentType = ball.type === 'solid' ? 'stripe' : 'solid';
                } else {
                    state.opponentType = ball.type;
                    state.myType = ball.type === 'solid' ? 'stripe' : 'solid';
                }
                state.assignedType = true;
                updatePlayerBadges();
            }

            // Check 8-ball rules
            if (ball.type === 'eight') {
                checkEightBallWin();
            }
        }

        function checkEightBallWin() {
            const myBalls = state.balls.filter(b => b.type === state.myType && !b.potted);
            const isValidWin = myBalls.length === 0 && state.isMyTurn;

            if (isValidWin) {
                endGame(true, 'You legally pocketed the 8-ball!');
            } else {
                const reason = !state.isMyTurn ? 
                    '8-ball pocketed on opponent turn' : 
                    '8-ball pocketed with balls remaining';
                endGame(false, reason);
            }
        }

        function handleCueBallPotted() {
            showError('Cue ball scratched!');

            if (!state.isSolo) {
                // Turn passes to opponent
                state.isMyTurn = false;
                Network.send({ type: 'SCRATCH' });
            }

            // Respawn cue ball after physics settle
            setTimeout(() => {
                spotCueBall();
            }, 500);
        }

        function spotCueBall() {
            // Find valid position in kitchen (left quarter)
            const kitchenX = 150;
            const kitchenWidth = TABLE_WIDTH / 4;

            let bestPos = new Vector2(kitchenX, TABLE_HEIGHT/2);
            let bestDist = 0;

            // Try several positions to find one with clearance
            for (let y = 50; y < TABLE_HEIGHT - 50; y += 20) {
                for (let x = 50; x < kitchenWidth; x += 20) {
                    const testPos = new Vector2(x, y);
                    let minDist = Infinity;

                    for (const ball of state.balls) {
                        if (ball !== state.cueBall && !ball.potted) {
                            const dist = testPos.dist(ball.pos) - ball.radius;
                            if (dist < minDist) minDist = dist;
                        }
                    }

                    if (minDist > bestDist && minDist > BALL_RADIUS * 2) {
                        bestDist = minDist;
                        bestPos = testPos;
                    }
                }
            }

            state.cueBall.potted = false;
            state.cueBall.pos = bestPos;
            state.cueBall.vel = new Vector2(0, 0);
            state.cueBall.spin = new Vector2(0, 0);

            if (!state.isSolo && !state.isMyTurn) {
                Network.send({ type: 'CUE_POSITION', pos: { x: bestPos.x, y: bestPos.y } });
            }
        }

        function endTurn() {
            if (state.isSolo) {
                state.isMyTurn = true;
                updateTurnDisplay();
                return;
            }

            // Calculate what happened this turn
            const pottedBalls = state.balls.filter(b => b.potted && b !== state.cueBall);
            const myBallsPotted = pottedBalls.filter(b => b.type === state.myType).length;
            const opponentBallsPotted = pottedBalls.filter(b => b.type === state.opponentType).length;
            const cuePotted = state.cueBall.potted;

            // If cue was potted, we already handled it in handleCueBallPotted
            // Just need to wait for respawn, don't change turn again
            if (cuePotted) {
                updateTurnDisplay();
                return;
            }

            let continueTurn = false;

            if (opponentBallsPotted > 0 && myBallsPotted === 0) {
                // Hit opponent ball first (foul) - turn passes
                state.isMyTurn = false;
            } else if (myBallsPotted > 0) {
                // Potted own ball, continue
                continueTurn = true;
            } else {
                // No balls potted, turn passes
                state.isMyTurn = false;
            }

            updateTurnDisplay();

            // Send turn data to opponent
            if (!continueTurn) {
                Network.sendTurnPass();
            } else {
                Network.send({ type: 'CONTINUE_TURN' });
            }
        }

        // ==========================================
        // NETWORKING - Authoritative with prediction
        // ==========================================
        const Network = {
            init() {
                const randomId = Math.floor(1000 + Math.random() * 9000).toString();

                state.peer = new Peer(randomId, {
                    debug: 1,
                    config: {
                        iceServers: [
                            { urls: 'stun:stun.l.google.com:19302' },
                            { urls: 'stun:stun1.l.google.com:19302' }
                        ]
                    }
                });

                state.peer.on('open', id => {
                    state.myId = id;
                    document.getElementById('my-id').innerHTML = `
                        <div class="code-display">${id}</div>
                        <p style="margin-top: 10px; color: #8b949e;">Share this code</p>
                    `;
                    document.getElementById('join-btn').disabled = false;
                });

                state.peer.on('connection', conn => {
                    if (state.conn) {
                        conn.close();
                        return;
                    }
                    this.setupConnection(conn, true);
                });

                state.peer.on('error', err => {
                    let msg = 'Connection error';
                    if (err.type === 'peer-unavailable') msg = 'Player not found';
                    else if (err.type === 'network') msg = 'Network error';
                    showError(msg);
                });
            },

            connect(peerId) {
                const conn = state.peer.connect(peerId, { 
                    reliable: true,
                    serialization: 'json'
                });

                document.getElementById('my-id').innerHTML = '<span class="spinner"></span> Connecting...';

                conn.on('open', () => {
                    this.setupConnection(conn, false);
                });

                setTimeout(() => {
                    if (!state.gameActive) {
                        showError('Connection failed');
                        document.getElementById('join-btn').disabled = false;
                    }
                }, 10000);
            },

            setupConnection(conn, isHost) {
                state.conn = conn;
                state.isHost = isHost;
                state.isMyTurn = isHost; // Host breaks

                conn.on('data', data => this.handleMessage(data));

                conn.on('close', () => {
                    showError('Opponent disconnected');
                    state.gameActive = false;
                });

                // Start ping monitoring
                this.startPing();

                // Start game
                startGame();
            },

            handleMessage(data) {
                switch(data.type) {
                    case 'SHOT':
                        this.handleRemoteShot(data);
                        break;
                    case 'TURN_PASS':
                        this.handleTurnPass(data);
                        break;
                    case 'CONTINUE_TURN':
                        state.isMyTurn = false;
                        updateTurnDisplay();
                        break;
                    case 'SCRATCH':
                        // Opponent scratched, it's now our turn
                        state.isMyTurn = true;
                        updateTurnDisplay();
                        break;
                    case 'CUE_POSITION':
                        if (!state.isMyTurn && state.cueBall.potted) {
                            state.cueBall.potted = false;
                            state.cueBall.pos = new Vector2(data.pos.x, data.pos.y);
                            state.cueBall.vel = new Vector2(0, 0);
                        }
                        break;
                    case 'SYNC':
                        this.handleSync(data);
                        break;
                    case 'PING':
                        this.send({ type: 'PONG', time: data.time });
                        break;
                    case 'PONG':
                        const latency = (Date.now() - data.time) / 2;
                        state.latency = latency;
                        document.getElementById('latency-display').textContent = `Ping: ${Math.round(latency)}ms`;
                        break;
                    case 'GAME_OVER':
                        if (!state.gameEnded) {
                            endGame(!data.winner, data.reason);
                        }
                        break;
                }
            },

            handleRemoteShot(data) {
                // Apply shot with latency compensation
                const latencyComp = state.latency / 1000; // seconds
                const compensation = Math.min(latencyComp * 0.5, 0.1); // Cap at 100ms worth

                state.cueBall.vel = new Vector2(data.vx, data.vy);
                state.cueBall.spin = new Vector2(data.sx || 0, data.sy || 0);

                // Fast-forward simulation for latency compensation
                const steps = Math.floor(compensation * PHYSICS_FPS);
                for (let i = 0; i < steps; i++) {
                    Physics.step(1/PHYSICS_FPS);
                }

                state.isMyTurn = true;
                updateTurnDisplay();
            },

            handleTurnPass(data) {
                state.isMyTurn = true;

                // Sync to authoritative state
                if (data.state) {
                    data.state.forEach(ballData => {
                        const ball = state.balls.find(b => b.id === ballData.id);
                        if (ball) ball.deserialize(ballData);
                    });
                }

                updateTurnDisplay();
            },

            handleSync(data) {
                // Only apply if we're not currently shooting
                if (!state.isDragging && !Physics.anyMoving()) {
                    data.balls.forEach(ballData => {
                        const ball = state.balls.find(b => b.id === ballData.id);
                        if (ball && !ball.moving) {
                            // Smooth interpolation to sync state
                            const targetPos = new Vector2(ballData.x, ballData.y);
                            const diff = targetPos.sub(ball.pos);
                            if (diff.length() > 1) {
                                ball.pos = ball.pos.add(diff.mul(0.3));
                            }
                        }
                    });
                }
            },

            send(data) {
                if (state.conn && state.conn.open) {
                    state.conn.send({ ...data, seq: ++state.syncSequence });
                }
            },

            sendTurnPass() {
                this.send({
                    type: 'TURN_PASS',
                    state: state.balls.map(b => b.serialize()),
                    timestamp: Date.now()
                });
            },

            startPing() {
                setInterval(() => {
                    this.send({ type: 'PING', time: Date.now() });
                }, 2000);

                document.getElementById('latency-display').style.display = 'block';
            },

            broadcastWin(reason) {
                this.send({ type: 'GAME_OVER', winner: true, reason });
            }
        };

        // ==========================================
        // INPUT HANDLING
        // ==========================================
        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = TABLE_WIDTH / rect.width;
            const scaleY = TABLE_HEIGHT / rect.height;

            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            return new Vector2(
                (clientX - rect.left) * scaleX,
                (clientY - rect.top) * scaleY
            );
        }

        function onPointerDown(e) {
            if (!state.isMyTurn || Physics.anyMoving() || !state.gameActive || state.gameEnded) return;
            if (!state.canShoot) return;

            const pos = getMousePos(e);
            const dist = pos.dist(state.cueBall.pos);

            if (dist < 60) {
                state.isDragging = true;
                state.dragStart = pos;
                state.dragCurrent = pos;
                document.getElementById('power-meter').style.display = 'block';
                e.preventDefault();
            }
        }

        function onPointerMove(e) {
            if (!state.isDragging) return;

            state.dragCurrent = getMousePos(e);

            const dragVector = state.dragStart.sub(state.dragCurrent);
            const power = Math.min(dragVector.length(), 150);

            document.getElementById('power-fill').style.width = (power / 150 * 100) + '%';
            e.preventDefault();
        }

        function onPointerUp(e) {
            if (!state.isDragging) return;

            state.isDragging = false;
            document.getElementById('power-meter').style.display = 'none';
            document.getElementById('power-fill').style.width = '0%';

            const dragVector = state.dragStart.sub(state.dragCurrent);
            const dist = dragVector.length();

            if (dist > 15) {
                const power = Math.min(dist / 6, MAX_POWER);
                const angle = Math.atan2(dragVector.y, dragVector.x);

                // Calculate spin based on offset from center hit
                const hitOffset = new Vector2(
                    Math.sin(angle) * 0, // Simplified: center hit for now
                    -Math.cos(angle) * 0
                );

                shoot(power, angle, hitOffset);
            }
        }

        function shoot(power, angle, spin) {
            state.canShoot = false;

            state.cueBall.vel = new Vector2(
                Math.cos(angle) * power,
                Math.sin(angle) * power
            );
            state.cueBall.spin = spin;

            // Send to opponent immediately
            if (!state.isSolo) {
                Network.send({
                    type: 'SHOT',
                    vx: state.cueBall.vel.x,
                    vy: state.cueBall.vel.y,
                    sx: spin.x,
                    sy: spin.y,
                    timestamp: Date.now()
                });
            }
        }

        // ==========================================
        // RENDERING
        // ==========================================
        function resize() {
            const container = document.getElementById('canvas-container');
            const aspect = TABLE_WIDTH / TABLE_HEIGHT;
            let w = container.clientWidth - 40;
            let h = w / aspect;

            if (h > container.clientHeight - 40) {
                h = container.clientHeight - 40;
                w = h * aspect;
            }

            canvas.width = TABLE_WIDTH;
            canvas.height = TABLE_HEIGHT;
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';
        }

        function draw() {
            // Clear with table color
            ctx.fillStyle = '#1b5e20';
            ctx.fillRect(0, 0, TABLE_WIDTH, TABLE_HEIGHT);

            // Wood border
            ctx.strokeStyle = '#5d4037';
            ctx.lineWidth = 20;
            ctx.strokeRect(0, 0, TABLE_WIDTH, TABLE_HEIGHT);

            // Inner border highlight
            ctx.strokeStyle = '#795548';
            ctx.lineWidth = 4;
            ctx.strokeRect(10, 10, TABLE_WIDTH - 20, TABLE_HEIGHT - 20);

            // Pockets
            POCKETS.forEach(p => {
                // Pocket interior
                ctx.fillStyle = '#0d1117';
                ctx.beginPath();
                ctx.arc(p.x, p.y, POCKET_RADIUS, 0, Math.PI * 2);
                ctx.fill();

                // Pocket rim
                ctx.strokeStyle = '#3e2723';
                ctx.lineWidth = 3;
                ctx.stroke();
            });

            // Draw balls
            state.balls.forEach(ball => ball.draw(ctx));

            // Draw aim line
            if (state.isMyTurn && !Physics.anyMoving() && !state.cueBall.potted && state.isDragging) {
                drawAimLine();
            }

            // Draw cue stick
            if (state.isMyTurn && !Physics.anyMoving() && !state.cueBall.potted) {
                drawCueStick();
            }
        }

        function drawAimLine() {
            const dragVector = state.dragStart.sub(state.dragCurrent);
            const angle = Math.atan2(dragVector.y, dragVector.x);
            const power = Math.min(dragVector.length() / 150, 1);

            const startX = state.cueBall.pos.x + Math.cos(angle) * BALL_RADIUS;
            const startY = state.cueBall.pos.y + Math.sin(angle) * BALL_RADIUS;
            const endX = startX + Math.cos(angle) * (100 + power * 200);
            const endY = startY + Math.sin(angle) * (100 + power * 200);

            ctx.save();
            ctx.strokeStyle = `rgba(255, 255, 255, ${0.3 + power * 0.4})`;
            ctx.lineWidth = 2;
            ctx.setLineDash([10, 5]);
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.lineTo(endX, endY);
            ctx.stroke();

            // Ghost ball
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.beginPath();
            ctx.arc(endX, endY, BALL_RADIUS, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function drawCueStick() {
            if (state.isDragging) return;

            const mousePos = state.dragCurrent || state.cueBall.pos;
            const angle = Math.atan2(
                mousePos.y - state.cueBall.pos.y,
                mousePos.x - state.cueBall.pos.x
            );

            const stickLength = 200;
            const offset = BALL_RADIUS + 20;

            const startX = state.cueBall.pos.x - Math.cos(angle) * (stickLength + offset);
            const startY = state.cueBall.pos.y - Math.sin(angle) * (stickLength + offset);
            const endX = state.cueBall.pos.x - Math.cos(angle) * offset;
            const endY = state.cueBall.pos.y - Math.sin(angle) * offset;

            ctx.save();
            ctx.strokeStyle = '#d4a574';
            ctx.lineWidth = 8;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.lineTo(endX, endY);
            ctx.stroke();

            // Cue tip
            ctx.strokeStyle = '#8b4513';
            ctx.lineWidth = 10;
            ctx.beginPath();
            ctx.moveTo(endX - Math.cos(angle) * 10, endY - Math.sin(angle) * 10);
            ctx.lineTo(endX, endY);
            ctx.stroke();
            ctx.restore();
        }

        // ==========================================
        // GAME LOOP
        // ==========================================
        function gameLoop(currentTime) {
            if (!state.gameActive) return;

            requestAnimationFrame(gameLoop);

            // Delta time calculation
            if (!state.lastFrameTime) state.lastFrameTime = currentTime;
            const deltaTime = (currentTime - state.lastFrameTime) / 1000;
            state.lastFrameTime = currentTime;

            // Accumulate time for physics
            state.accumulator += deltaTime;

            // Fixed timestep physics
            while (state.accumulator >= 1/PHYSICS_FPS) {
                Physics.step(1/PHYSICS_FPS);
                state.accumulator -= 1/PHYSICS_FPS;
            }

            // Check if balls stopped
            if (!Physics.anyMoving() && !state.canShoot) {
                state.canShoot = true;
                endTurn();
            }

            // Periodic sync (host only, every 100ms)
            if (state.isHost && state.gameActive && !Physics.anyMoving()) {
                if (currentTime - state.lastSyncTime > 100) {
                    Network.send({
                        type: 'SYNC',
                        balls: state.balls.map(b => b.serialize())
                    });
                    state.lastSyncTime = currentTime;
                }
            }

            draw();
        }

        // ==========================================
        // UI UPDATES
        // ==========================================
        function updatePlayerBadges() {
            const p1 = document.getElementById('p1-badge');
            const p2 = document.getElementById('p2-badge');

            if (state.isSolo) {
                p1.className = 'player-badge solid active';
                p1.textContent = '● Practice';
                p2.style.display = 'none';
                return;
            }

            p2.style.display = 'block';

            if (!state.assignedType) {
                p1.textContent = state.isHost ? '● You (Host)' : '● Opponent';
                p2.textContent = state.isHost ? '○ Opponent' : '○ You (Guest)';
                p1.className = 'player-badge solid' + (state.isMyTurn ? ' active' : '');
                p2.className = 'player-badge stripe' + (!state.isMyTurn ? ' active' : '');
            } else {
                const amSolid = state.myType === 'solid';
                if (state.isHost) {
                    p1.className = 'player-badge solid' + (amSolid && state.isMyTurn ? ' active' : '');
                    p1.textContent = amSolid ? '● You' : '○ You';
                    p2.className = 'player-badge stripe' + (!amSolid && !state.isMyTurn ? ' active' : '');
                    p2.textContent = !amSolid ? '● Opp' : '○ Opp';
                } else {
                    p1.className = 'player-badge solid' + (!amSolid && !state.isMyTurn ? ' active' : '');
                    p1.textContent = !amSolid ? '● Opp' : '○ Opp';
                    p2.className = 'player-badge stripe' + (amSolid && state.isMyTurn ? ' active' : '');
                    p2.textContent = amSolid ? '● You' : '○ You';
                }
            }
        }

        function updateTurnDisplay() {
            const indicator = document.getElementById('turn-indicator');

            if (!state.gameActive) {
                indicator.textContent = 'Waiting...';
                return;
            }

            if (state.isMyTurn && state.canShoot) {
                indicator.textContent = '★ YOUR TURN ★';
                indicator.style.color = '#00ff00';
            } else if (state.isMyTurn && !state.canShoot) {
                indicator.textContent = 'Wait for stop...';
                indicator.style.color = '#ffaa00';
            } else {
                indicator.textContent = "OPPONENT'S TURN";
                indicator.style.color = '#ff6666';
            }

            updatePlayerBadges();
        }

        function endGame(win, reason) {
            if (state.gameEnded) return;
            state.gameEnded = true;
            state.gameActive = false;

            if (!state.isSolo && win) {
                Network.broadcastWin(reason);
            }

            const screen = document.getElementById('end-screen');
            const title = document.getElementById('end-title');
            const msg = document.getElementById('end-msg');

            screen.style.display = 'flex';
            title.textContent = win ? '🎉 You Win!' : '😔 You Lose';
            title.style.color = win ? '#238636' : '#da3633';

            const myBalls = state.balls.filter(b => b.type === state.myType && !b.potted).length;
            const totalMy = state.balls.filter(b => b.type === state.myType).length;

            msg.innerHTML = `
                ${reason}<br>
                <small>Your balls: ${totalMy - myBalls}/${totalMy} pocketed</small>
            `;
        }

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 4000);
        }

        // ==========================================
        // INITIALIZATION
        // ==========================================
        function startGame() {
            document.getElementById('setup').style.display = 'none';
            resize();
            initRack();
            state.gameActive = true;
            state.lastFrameTime = 0;
            state.accumulator = 0;
            state.canShoot = true;
            updatePlayerBadges();
            updateTurnDisplay();
            requestAnimationFrame(gameLoop);
        }

        function startSolo() {
            state.isSolo = true;
            state.isMyTurn = true;
            startGame();
        }

        function connect() {
            const friendId = document.getElementById('join-id').value.trim();
            if (!friendId || friendId.length !== 4) {
                showError('Enter valid 4-digit code');
                return;
            }
            Network.connect(friendId);
        }

        // Event listeners
        canvas.addEventListener('mousedown', onPointerDown);
        canvas.addEventListener('touchstart', onPointerDown, {passive: false});
        window.addEventListener('mousemove', onPointerMove);
        window.addEventListener('touchmove', onPointerMove, {passive: false});
        window.addEventListener('mouseup', onPointerUp);
        window.addEventListener('touchend', onPointerUp);
        window.addEventListener('resize', resize);
        window.addEventListener('load', () => Network.init());
    </script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Pool P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --gold: #eec27e; --dark: #0d1117; --card: #161b22; --felt: #1a4d2e; --felt-dark: #0f2e1b; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--dark); color: #c9d1d9; font-family: system-ui, sans-serif; overflow: hidden; touch-action: none; user-select: none; }
        #setup { position: fixed; inset: 0; background: rgba(13,17,23,0.98); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .code-display { font-family: monospace; background: #000; color: var(--gold); padding: 20px 40px; border-radius: 12px; letter-spacing: 8px; font-size: 2.2rem; border: 2px solid var(--gold); margin: 20px 0; font-weight: bold; }
        .spinner { display: inline-block; width: 40px; height: 40px; border: 4px solid rgba(238,194,126,0.2); border-radius: 50%; border-top-color: var(--gold); animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn { background: var(--gold); color: #3e2e14; padding: 15px 30px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn:disabled { opacity: 0.5; }
        .btn-secondary { background: transparent; color: #8b949e; border: 1px solid #30363d; }
        input { padding: 15px; text-align: center; border-radius: 10px; background: #111; color: white; border: 1px solid var(--gold); font-size: 1.2rem; width: 200px; }
        #game-ui { position: fixed; top: 0; left: 0; right: 0; background: var(--card); padding: 15px 20px; border-bottom: 2px solid var(--gold); display: none; justify-content: space-between; align-items: center; z-index: 10; }
        .player-badge { padding: 8px 16px; border-radius: 20px; font-weight: 600; font-size: 0.9rem; }
        .player-badge.active { box-shadow: 0 0 20px var(--gold); border: 2px solid var(--gold); }
        .solid { background: #d32f2f; color: white; }
        .stripe { background: #ffeb3b; color: #333; }
        #turn-indicator { font-weight: 700; color: var(--gold); font-size: 1.1rem; }
        #canvas-container { position: fixed; top: 70px; left: 0; right: 0; bottom: 0; display: none; align-items: center; justify-content: center; background: radial-gradient(circle at center, var(--felt) 0%, var(--felt-dark) 100%); }
        canvas { box-shadow: 0 20px 60px rgba(0,0,0,0.8); border-radius: 8px; cursor: crosshair; touch-action: none; }
        #power-meter { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 200px; height: 12px; background: rgba(0,0,0,0.6); border-radius: 20px; overflow: hidden; border: 2px solid var(--gold); z-index: 20; display: none; }
        #power-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #4caf50, #ffeb3b, #f44336); transition: width 0.05s; }
        #end-screen { position: fixed; inset: 0; background: rgba(13,17,23,0.95); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .error-toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: #da3633; color: white; padding: 12px 24px; border-radius: 8px; font-weight: 600; z-index: 200; display: none; }
        .copy-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="setup">
        <h1 style="color: var(--gold); font-size: 2.5rem; margin-bottom: 10px;">🎱 Pro Pool</h1>
        <div id="my-id"><span class="spinner"></span> Connecting...</div>
        <div style="margin-top: 20px;">
            <input type="text" id="join-id" placeholder="Enter Code" disabled>
            <button class="btn" id="join-btn" onclick="connect()" disabled style="margin-left: 10px;">JOIN</button>
        </div>
        <button class="btn btn-secondary" onclick="startSolo()" style="margin-top: 15px;">Practice Solo</button>
    </div>

    <div class="error-toast" id="error"></div>
    
    <div id="game-ui">
        <div class="player-badge solid" id="p1-badge">P1</div>
        <div id="turn-indicator">Wait</div>
        <div class="player-badge stripe" id="p2-badge">P2</div>
    </div>

    <div id="canvas-container">
        <canvas id="table"></canvas>
    </div>

    <div id="power-meter"><div id="power-fill"></div></div>

    <div id="end-screen">
        <h1 id="end-title" style="font-size: 3rem; color: var(--gold);">Game Over</h1>
        <div id="end-msg" style="color: #8b949e; margin: 20px;"></div>
        <button class="btn" onclick="location.reload()">Play Again</button>
    </div>

    <script>
        // ==========================================
        // OPTIMIZED CONSTANTS (FIXED BASED ON SIMULATION)
        // ==========================================
        const TABLE_WIDTH = 800;
        const TABLE_HEIGHT = 400;
        const BALL_RADIUS = 11;
        const POCKET_RADIUS = 28;
        const MAX_POWER = 25;           // Increased from 20
        const FRICTION = 0.995;         // Changed from 0.992 (less friction = longer rolls)
        const STOP_THRESHOLD = 0.05;    // Changed from 0.1 (balls roll longer)
        const WALL_BOUNCE = 0.8;        // Increased from 0.7
        const BALL_BOUNCE = 0.95;       // Slightly reduced for stability
        
        const POCKETS = [[0,0], [400,0], [800,0], [0,400], [400,400], [800,400]];

        // ==========================================
        // STATE
        // ==========================================
        const state = {
            balls: [], cueBall: null, eightBall: null,
            isMyTurn: false, isHost: false, isSolo: false,
            myType: null, gameActive: false, gameEnded: false,
            isDragging: false, dragStart: null, dragCurrent: null,
            canShoot: true, mousePos: {x: 400, y: 200},
            peer: null, conn: null, myId: null
        };

        const canvas = document.getElementById('table');
        const ctx = canvas.getContext('2d', { alpha: false }); // Optimized

        // ==========================================
        // BALL CLASS (OPTIMIZED)
        // ==========================================
        class Ball {
            constructor(x, y, color, type, num) {
                this.x = x; this.y = y;
                this.vx = 0; this.vy = 0;
                this.color = color; this.type = type; this.number = num;
                this.radius = BALL_RADIUS;
                this.potted = false;
                this.id = num;
            }

            get speed() { return Math.hypot(this.vx, this.vy); }
            get moving() { return this.speed > STOP_THRESHOLD; }

            update() {
                if (this.potted) return;

                // Move
                this.x += this.vx;
                this.y += this.vy;

                // Friction (optimized single multiply)
                this.vx *= FRICTION;
                this.vy *= FRICTION;

                // Stop check
                if (this.speed < STOP_THRESHOLD) {
                    this.vx = 0;
                    this.vy = 0;
                }

                // Walls (simplified)
                const r = this.radius;
                if (this.x < r) { this.x = r; this.vx = Math.abs(this.vx) * WALL_BOUNCE; }
                if (this.x > TABLE_WIDTH - r) { this.x = TABLE_WIDTH - r; this.vx = -Math.abs(this.vx) * WALL_BOUNCE; }
                if (this.y < r) { this.y = r; this.vy = Math.abs(this.vy) * WALL_BOUNCE; }
                if (this.y > TABLE_HEIGHT - r) { this.y = TABLE_HEIGHT - r; this.vy = -Math.abs(this.vy) * WALL_BOUNCE; }
            }

            resolve(other) {
                const dx = other.x - this.x;
                const dy = other.y - this.y;
                const dist = Math.hypot(dx, dy);
                const minDist = this.radius + other.radius;

                if (dist >= minDist || dist === 0) return false;

                // Separate
                const overlap = minDist - dist;
                const nx = dx / dist;
                const ny = dy / dist;
                
                this.x -= nx * overlap * 0.5;
                this.y -= ny * overlap * 0.5;
                other.x += nx * overlap * 0.5;
                other.y += ny * overlap * 0.5;

                // Bounce (simplified)
                const dvx = other.vx - this.vx;
                const dvy = other.vy - this.vy;
                const velAlong = dvx * nx + dvy * ny;
                if (velAlong > 0) return false;

                const j = -BALL_BOUNCE * velAlong;
                this.vx -= j * nx;
                this.vy -= j * ny;
                other.vx += j * nx;
                other.vy += j * ny;
                return true;
            }

            draw(ctx) {
                if (this.potted) return;

                // Simple shadow (fast)
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.arc(this.x + 2, this.y + 2, this.radius, 0, Math.PI*2);
                ctx.fill();

                // Solid color (no gradients for speed)
                ctx.fillStyle = this.type === 'cue' ? '#ffffff' : 
                               this.type === 'eight' ? '#222222' : this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
                ctx.fill();

                // Simple highlight
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.beginPath();
                ctx.arc(this.x - 3, this.y - 3, 3, 0, Math.PI*2);
                ctx.fill();
            }
        }

        // ==========================================
        // GAME LOGIC
        // ==========================================
        function initRack() {
            state.balls = [];
            state.cueBall = new Ball(150, TABLE_HEIGHT/2, 'white', 'cue', 0);
            state.balls.push(state.cueBall);

            const startX = 600, startY = TABLE_HEIGHT/2;
            const spacing = BALL_RADIUS * 1.732;
            const colors = ['#ff4444', '#ff8800', '#ffdd00', '#44ff44', '#4444ff', '#8844ff', '#ff44ff', '#8B4513'];
            
            let idx = 0;
            for (let row = 0; row < 5; row++) {
                for (let col = 0; col <= row; col++) {
                    const x = startX + row * spacing;
                    const y = startY + (col - row/2) * BALL_RADIUS * 2;

                    if (row === 2 && col === 1) {
                        state.eightBall = new Ball(x, y, 'black', 'eight', 8);
                        state.balls.push(state.eightBall);
                    } else {
                        const solid = idx % 2 === 0;
                        const type = solid ? 'solid' : 'stripe';
                        const color = colors[Math.min(Math.floor(idx/2), 7)];
                        const num = solid ? (Math.floor(idx/2) + 1) : (Math.floor(idx/2) + 9);
                        state.balls.push(new Ball(x, y, color, type, num));
                        idx++;
                    }
                }
            }
        }

        function updatePhysics() {
            // Update all balls
            for (let b of state.balls) b.update();

            // Collisions (reduced to 2 passes for speed)
            for (let pass = 0; pass < 2; pass++) {
                for (let i = 0; i < state.balls.length; i++) {
                    for (let j = i + 1; j < state.balls.length; j++) {
                        const b1 = state.balls[i], b2 = state.balls[j];
                        if (!b1.potted && !b2.potted) b1.resolve(b2);
                    }
                }
            }

            // Pockets
            for (let b of state.balls) {
                if (b.potted) continue;
                for (let p of POCKETS) {
                    if (Math.hypot(b.x - p[0], b.y - p[1]) < POCKET_RADIUS - 5) {
                        b.potted = true;
                        b.vx = 0; b.vy = 0;
                        handlePotted(b);
                        break;
                    }
                }
            }
        }

        function anyMoving() {
            return state.balls.some(b => !b.potted && b.moving);
        }

        function handlePotted(ball) {
            if (ball.type === 'cue') {
                showError('Scratch!');
                setTimeout(() => {
                    ball.potted = false;
                    ball.x = 150; ball.y = TABLE_HEIGHT/2;
                    ball.vx = 0; ball.vy = 0;
                }, 500);
            } else if (ball.type === 'eight') {
                const remaining = state.balls.filter(b => b.type === state.myType && !b.potted && b !== ball).length;
                endGame(remaining === 0, remaining === 0 ? 'You won!' : 'Too early!');
            }
        }

        function endTurn() {
            if (state.isSolo) {
                state.isMyTurn = true;
                updateUI();
                return;
            }
            
            const potted = state.balls.filter(b => b.potted && b !== state.cueBall && b.type !== 'eight');
            const myPotted = potted.filter(b => b.type === state.myType).length;
            
            let continueTurn = myPotted > 0 && !state.cueBall.potted;
            if (!continueTurn) state.isMyTurn = false;
            
            updateUI();
            
            if (!continueTurn && state.conn) {
                state.conn.send({type: 'TURN', balls: state.balls.map(b => ({id: b.id, x: b.x, y: b.y, vx: b.vx, vy: b.vy, potted: b.potted}))});
            }
        }

        // ==========================================
        // NETWORKING
        // ==========================================
        function initPeer() {
            const randomId = Math.floor(1000 + Math.random() * 9000).toString();
            state.peer = new Peer(randomId, {config: {iceServers: [{urls: 'stun:stun.l.google.com:19302'}]}});
            
            const timeout = setTimeout(() => {
                if (!state.myId) document.getElementById('my-id').innerHTML = '<span style="color:#ff6666">Timeout</span>';
            }, 15000);

            state.peer.on('open', id => {
                clearTimeout(timeout);
                state.myId = id;
                document.getElementById('my-id').innerHTML = `
                    <div class="code-display">${id}</div>
                    <button class="copy-btn" onclick="navigator.clipboard.writeText('${id}')">Copy</button>
                `;
                document.getElementById('join-id').disabled = false;
                document.getElementById('join-btn').disabled = false;
            });

            state.peer.on('connection', conn => {
                state.isHost = true;
                state.myType = 'solid';
                setupConn(conn);
                startGame();
            });
        }

        function connect() {
            const id = document.getElementById('join-id').value.trim();
            if (!id || id.length !== 4) return alert('Enter 4-digit code');
            
            state.isHost = false;
            state.myType = 'stripe';
            const conn = state.peer.connect(id, {reliable: true});
            document.getElementById('my-id').innerHTML = '<span class="spinner"></span> Connecting...';
            setupConn(conn);
        }

        function setupConn(conn) {
            state.conn = conn;
            conn.on('open', () => { if (!state.isHost) startGame(); });
            conn.on('data', data => {
                if (data.type === 'TURN') {
                    state.isMyTurn = true;
                    if (data.balls) {
                        data.balls.forEach(s => {
                            const b = state.balls.find(x => x.id === s.id);
                            if (b) { b.x = s.x; b.y = s.y; b.vx = s.vx; b.vy = s.vy; b.potted = s.potted; }
                        });
                    }
                    updateUI();
                } else if (data.type === 'SHOT' && state.cueBall) {
                    state.cueBall.vx = data.vx;
                    state.cueBall.vy = data.vy;
                    state.isMyTurn = true;
                    updateUI();
                }
            });
        }

        // ==========================================
        // INPUT (OPTIMIZED)
        // ==========================================
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = TABLE_WIDTH / rect.width;
            const scaleY = TABLE_HEIGHT / rect.height;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY};
        }

        function onDown(e) {
            if (!state.isMyTurn || anyMoving() || !state.canShoot) return;
            
            const pos = getPos(e);
            const dist = Math.hypot(pos.x - state.cueBall.x, pos.y - state.cueBall.y);
            
            if (dist < BALL_RADIUS * 4) {
                state.isDragging = true;
                state.dragStart = pos;
                state.dragCurrent = pos;
                document.getElementById('power-meter').style.display = 'block';
                e.preventDefault();
            }
        }

        function onMove(e) {
            const pos = getPos(e);
            state.mousePos = pos; // ALWAYS update for cue stick tracking

            if (state.isDragging) {
                state.dragCurrent = pos;
                const dist = Math.hypot(state.dragStart.x - pos.x, state.dragStart.y - pos.y);
                document.getElementById('power-fill').style.width = Math.min(dist / 150 * 100, 100) + '%';
                e.preventDefault();
            }
        }

        function onUp(e) {
            if (!state.isDragging) return;
            state.isDragging = false;
            document.getElementById('power-meter').style.display = 'none';
            document.getElementById('power-fill').style.width = '0%';

            const dist = Math.hypot(state.dragStart.x - state.dragCurrent.x, state.dragStart.y - state.dragCurrent.y);
            if (dist > 10) {
                // INCREASED POWER MULTIPLIER from 0.4 to 0.6
                const power = Math.min(dist * 0.6, MAX_POWER);
                const angle = Math.atan2(state.dragStart.y - state.dragCurrent.y, state.dragStart.x - state.dragCurrent.x);
                
                state.cueBall.vx = Math.cos(angle) * power;
                state.cueBall.vy = Math.sin(angle) * power;
                state.canShoot = false;

                if (!state.isSolo && state.conn) {
                    state.conn.send({type: 'SHOT', vx: state.cueBall.vx, vy: state.cueBall.vy});
                }
            }
        }

        // ==========================================
        // RENDERING (OPTIMIZED)
        // ==========================================
        function resize() {
            const container = document.getElementById('canvas-container');
            const aspect = TABLE_WIDTH / TABLE_HEIGHT;
            let w = container.clientWidth - 40;
            let h = w / aspect;
            if (h > container.clientHeight - 40) { h = container.clientHeight - 40; w = h * aspect; }
            canvas.width = TABLE_WIDTH;
            canvas.height = TABLE_HEIGHT;
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';
        }

        function draw() {
            // Clear with solid color (fast)
            ctx.fillStyle = '#1a4d2e';
            ctx.fillRect(0, 0, TABLE_WIDTH, TABLE_HEIGHT);

            // Border only (simplified)
            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 20;
            ctx.strokeRect(0, 0, TABLE_WIDTH, TABLE_HEIGHT);

            // Pockets (simplified)
            ctx.fillStyle = '#0d1117';
            for (let p of POCKETS) {
                ctx.beginPath();
                ctx.arc(p[0], p[1], POCKET_RADIUS, 0, Math.PI*2);
                ctx.fill();
            }

            // Balls
            for (let b of state.balls) b.draw(ctx);

            // CUE STICK - Always draw when my turn and not moving
            if (state.isMyTurn && !anyMoving() && !state.cueBall.potted) {
                drawCueStick();
            }
        }

        function drawCueStick() {
            const cue = state.cueBall;
            let angle, offset = BALL_RADIUS + 30;

            if (state.isDragging && state.dragCurrent) {
                const dx = state.dragStart.x - state.dragCurrent.x;
                const dy = state.dragStart.y - state.dragCurrent.y;
                const power = Math.min(Math.hypot(dx, dy), 150);
                angle = Math.atan2(dy, dx);
                offset = BALL_RADIUS + 30 + power * 0.4;
                
                // Aim line
                ctx.strokeStyle = `rgba(255,255,255,${0.3 + power/300})`;
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(cue.x, cue.y);
                ctx.lineTo(cue.x + Math.cos(angle) * (100 + power), cue.y + Math.sin(angle) * (100 + power));
                ctx.stroke();
                ctx.setLineDash([]);
            } else {
                // FOLLOW MOUSE when not dragging
                angle = Math.atan2(state.mousePos.y - cue.y, state.mousePos.x - cue.x);
            }

            // Stick
            const len = 180;
            const startX = cue.x - Math.cos(angle) * (len + offset);
            const startY = cue.y - Math.sin(angle) * (len + offset);
            const endX = cue.x - Math.cos(angle) * offset;
            const endY = cue.y - Math.sin(angle) * offset;

            ctx.strokeStyle = '#d4a574';
            ctx.lineWidth = 8;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.lineTo(endX, endY);
            ctx.stroke();

            // Tip
            ctx.strokeStyle = '#3e2723';
            ctx.lineWidth = 10;
            ctx.beginPath();
            ctx.moveTo(endX - Math.cos(angle)*10, endY - Math.sin(angle)*10);
            ctx.lineTo(endX, endY);
            ctx.stroke();
        }

        // ==========================================
        // MAIN LOOP (CRITICAL FIX)
        // ==========================================
        function loop() {
            if (!state.gameActive) return;

            // Physics first
            updatePhysics();

            // Check turn end
            if (!state.canShoot && !anyMoving()) {
                state.canShoot = true;
                endTurn();
            }

            // Then render
            draw();

            // Next frame
            requestAnimationFrame(loop);
        }

        // ==========================================
        // UI
        // ==========================================
        function updateUI() {
            const p1 = document.getElementById('p1-badge');
            const p2 = document.getElementById('p2-badge');
            const turn = document.getElementById('turn-indicator');

            if (state.isSolo) {
                p1.className = 'player-badge solid active';
                p1.textContent = '● Practice';
                p2.style.display = 'none';
            } else {
                p1.textContent = state.isHost ? '● You' : '● Opp';
                p2.textContent = state.isHost ? '○ Opp' : '○ You';
                p1.className = 'player-badge solid' + (state.isMyTurn ? ' active' : '');
                p2.className = 'player-badge stripe' + (!state.isMyTurn ? ' active' : '');
            }

            turn.textContent = state.isMyTurn ? (state.canShoot ? '★ YOUR TURN ★' : 'Moving...') : "OPPONENT'S TURN";
            turn.style.color = state.isMyTurn ? (state.canShoot ? '#00ff00' : '#ffaa00') : '#ff6666';
        }

        function endGame(win, msg) {
            if (state.gameEnded) return;
            state.gameEnded = true;
            state.gameActive = false;
            document.getElementById('end-screen').style.display = 'flex';
            document.getElementById('end-title').textContent = win ? '🎉 You Win!' : '😔 You Lose';
            document.getElementById('end-title').style.color = win ? '#238636' : '#da3633';
            document.getElementById('end-msg').textContent = msg;
        }

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 2000);
        }

        function startGame() {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('game-ui').style.display = 'flex';
            document.getElementById('canvas-container').style.display = 'flex';
            resize();
            initRack();
            state.gameActive = true;
            state.canShoot = true;
            state.isMyTurn = state.isHost;
            updateUI();
            loop(); // Start the loop
        }

        function startSolo() {
            state.isSolo = true;
            state.isHost = true;
            state.myType = 'solid';
            startGame();
        }

        // Init
        window.addEventListener('load', initPeer);
        window.addEventListener('resize', resize);
        
        // Input events
        canvas.addEventListener('mousedown', onDown);
        canvas.addEventListener('touchstart', onDown, {passive: false});
        window.addEventListener('mousemove', onMove); // Window level for drag outside
        window.addEventListener('touchmove', onMove, {passive: false});
        window.addEventListener('mouseup', onUp);
        window.addEventListener('touchend', onUp);
    </script>
</body>
</html>

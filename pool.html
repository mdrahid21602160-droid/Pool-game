<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Pool P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --gold: #eec27e; --dark: #0d1117; --card: #161b22; --felt: #1a4d2e; --felt-dark: #0f2e1b; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--dark); color: #c9d1d9; font-family: system-ui, sans-serif; overflow: hidden; touch-action: none; user-select: none; }
        #setup { position: fixed; inset: 0; background: rgba(13,17,23,0.98); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .code-display { font-family: monospace; background: #000; color: var(--gold); padding: 20px 40px; border-radius: 12px; letter-spacing: 8px; font-size: 2.2rem; border: 2px solid var(--gold); margin: 20px 0; }
        .spinner { display: inline-block; width: 40px; height: 40px; border: 4px solid rgba(238,194,126,0.2); border-radius: 50%; border-top-color: var(--gold); animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn { background: var(--gold); color: #3e2e14; padding: 15px 30px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn:disabled { opacity: 0.5; }
        .btn-secondary { background: transparent; color: #8b949e; border: 1px solid #30363d; margin-top: 15px; }
        input { padding: 15px; text-align: center; border-radius: 10px; background: #111; color: white; border: 1px solid var(--gold); font-size: 1.2rem; width: 200px; }
        #game-ui { position: fixed; top: 0; left: 0; right: 0; background: var(--card); padding: 15px 20px; border-bottom: 2px solid var(--gold); display: none; justify-content: space-between; align-items: center; z-index: 10; }
        .player-badge { padding: 8px 16px; border-radius: 20px; font-weight: 600; font-size: 0.9rem; }
        .player-badge.active { box-shadow: 0 0 20px var(--gold); border: 2px solid var(--gold); }
        .solid { background: #d32f2f; color: white; }
        .stripe { background: #ffeb3b; color: #333; }
        #turn-indicator { font-weight: 700; color: var(--gold); font-size: 1.1rem; }
        #canvas-container { position: fixed; top: 70px; left: 0; right: 0; bottom: 0; display: none; align-items: center; justify-content: center; background: radial-gradient(circle at center, var(--felt) 0%, var(--felt-dark) 100%); }
        canvas { box-shadow: 0 20px 60px rgba(0,0,0,0.8); border-radius: 8px; cursor: crosshair; touch-action: none; }
        #power-meter { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 200px; height: 12px; background: rgba(0,0,0,0.6); border-radius: 20px; overflow: hidden; border: 2px solid var(--gold); z-index: 20; display: none; }
        #power-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #4caf50, #ffff00, #ff0000); }
        #end-screen { position: fixed; inset: 0; background: rgba(13,17,23,0.95); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .error-toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: #da3633; color: white; padding: 12px 24px; border-radius: 8px; font-weight: 600; z-index: 200; display: none; }
        .copy-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="setup">
        <h1 style="color: var(--gold); font-size: 2.5rem; margin-bottom: 10px;">🎱 Pro Pool</h1>
        <div id="my-id"><span class="spinner"></span> Connecting...</div>
        <div style="margin-top: 20px;">
            <input type="text" id="join-id" placeholder="Enter Code" disabled>
            <button class="btn" id="join-btn" onclick="connect()" disabled style="margin-left: 10px;">JOIN</button>
        </div>
        <button class="btn btn-secondary" onclick="startSolo()">Practice Solo</button>
    </div>

    <div class="error-toast" id="error"></div>
    
    <div id="game-ui">
        <div class="player-badge solid" id="p1-badge">P1</div>
        <div id="turn-indicator">Wait</div>
        <div class="player-badge stripe" id="p2-badge">P2</div>
    </div>

    <div id="canvas-container">
        <canvas id="table"></canvas>
    </div>

    <div id="power-meter"><div id="power-fill"></div></div>

    <div id="end-screen">
        <h1 id="end-title" style="font-size: 3rem; color: var(--gold);">Game Over</h1>
        <div id="end-msg" style="color: #8b949e; margin: 20px;"></div>
        <button class="btn" onclick="location.reload()">Play Again</button>
    </div>

    <script>
        // ==========================================
        // CONSTANTS
        // ==========================================
        const TABLE_WIDTH = 800;
        const TABLE_HEIGHT = 400;
        const BALL_RADIUS = 11;
        const POCKET_RADIUS = 28;
        const MAX_POWER = 25;
        const FRICTION = 0.995;
        const STOP_THRESHOLD = 0.05;
        const WALL_BOUNCE = 0.8;
        const BALL_BOUNCE = 0.95;
        
        const POCKETS = [[0,0], [400,0], [800,0], [0,400], [400,400], [800,400]];

        // ==========================================
        // STATE
        // ==========================================
        const state = {
            balls: [], cueBall: null, eightBall: null,
            isMyTurn: false, isHost: false, isSolo: false,
            myType: null, opponentType: null, assignedType: false,
            gameActive: false, gameEnded: false,
            isDragging: false, dragStart: null, dragCurrent: null,
            canShoot: true, mousePos: {x: 400, y: 200},
            peer: null, conn: null, myId: null,
            ballsPottedThisTurn: [],
            scratchInProgress: false // NEW: Prevent double scratch handling
        };

        const canvas = document.getElementById('table');
        const ctx = canvas.getContext('2d', { alpha: false });

        // ==========================================
        // BALL CLASS
        // ==========================================
        class Ball {
            constructor(x, y, color, type, num) {
                this.x = x; this.y = y;
                this.vx = 0; this.vy = 0;
                this.color = color; this.type = type; this.number = num;
                this.radius = BALL_RADIUS;
                this.potted = false;
                this.id = num;
                this.wasPotted = false;
            }

            get speed() { return Math.hypot(this.vx, this.vy); }
            get moving() { return this.speed > STOP_THRESHOLD; }

            update() {
                if (this.potted) return;

                this.x += this.vx;
                this.y += this.vy;
                this.vx *= FRICTION;
                this.vy *= FRICTION;

                if (this.speed < STOP_THRESHOLD) {
                    this.vx = 0;
                    this.vy = 0;
                }

                const r = this.radius;
                if (this.x < r) { this.x = r; this.vx = Math.abs(this.vx) * WALL_BOUNCE; }
                if (this.x > TABLE_WIDTH - r) { this.x = TABLE_WIDTH - r; this.vx = -Math.abs(this.vx) * WALL_BOUNCE; }
                if (this.y < r) { this.y = r; this.vy = Math.abs(this.vy) * WALL_BOUNCE; }
                if (this.y > TABLE_HEIGHT - r) { this.y = TABLE_HEIGHT - r; this.vy = -Math.abs(this.vy) * WALL_BOUNCE; }
            }

            resolve(other) {
                const dx = other.x - this.x;
                const dy = other.y - this.y;
                const dist = Math.hypot(dx, dy);
                const minDist = this.radius + other.radius;
                if (dist >= minDist || dist === 0) return false;

                const overlap = minDist - dist;
                const nx = dx / dist;
                const ny = dy / dist;
                
                this.x -= nx * overlap * 0.5;
                this.y -= ny * overlap * 0.5;
                other.x += nx * overlap * 0.5;
                other.y += ny * overlap * 0.5;

                const dvx = other.vx - this.vx;
                const dvy = other.vy - this.vy;
                const velAlong = dvx * nx + dvy * ny;
                if (velAlong > 0) return false;

                const j = -BALL_BOUNCE * velAlong;
                this.vx -= j * nx;
                this.vy -= j * ny;
                other.vx += j * nx;
                other.vy += j * ny;
                return true;
            }

            draw(ctx) {
                if (this.potted) return;

                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.arc(this.x + 2, this.y + 2, this.radius, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = this.type === 'cue' ? '#ffffff' : this.type === 'eight' ? '#222222' : this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();

                if (this.number && this.type !== 'cue') {
                    ctx.fillStyle = 'white';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius * 0.4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = 'black';
                    ctx.font = 'bold 10px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.number, this.x, this.y);
                }

                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.beginPath();
                ctx.arc(this.x - 3, this.y - 3, 3, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // ==========================================
        // GAME LOGIC
        // ==========================================
        function initRack() {
            state.balls = [];
            state.cueBall = new Ball(150, TABLE_HEIGHT / 2, 'white', 'cue', 0);
            state.balls.push(state.cueBall);

            const startX = 600, startY = TABLE_HEIGHT / 2;
            const spacing = BALL_RADIUS * 1.732;
            const colors = ['#ff4444', '#ff8800', '#ffdd00', '#44ff44', '#4444ff', '#8844ff', '#ff44ff', '#8B4513'];
            
            let idx = 0;
            for (let row = 0; row < 5; row++) {
                for (let col = 0; col <= row; col++) {
                    const x = startX + row * spacing;
                    const y = startY + (col - row / 2) * BALL_RADIUS * 2;
                    if (row === 2 && col === 1) {
                        state.eightBall = new Ball(x, y, 'black', 'eight', 8);
                        state.balls.push(state.eightBall);
                    } else {
                        const solid = idx % 2 === 0;
                        const type = solid ? 'solid' : 'stripe';
                        const color = colors[Math.min(Math.floor(idx / 2), 7)];
                        const num = solid ? (Math.floor(idx / 2) + 1) : (Math.floor(idx / 2) + 9);
                        state.balls.push(new Ball(x, y, color, type, num));
                        idx++;
                    }
                }
            }

            state.ballsPottedThisTurn = [];
            state.balls.forEach(b => b.wasPotted = false);
            state.scratchInProgress = false;
        }

        function updatePhysics() {
            if (state.canShoot) {
                state.balls.forEach(b => b.wasPotted = b.potted);
            }

            for (let b of state.balls) b.update();

            for (let pass = 0; pass < 2; pass++) {
                for (let i = 0; i < state.balls.length; i++) {
                    for (let j = i + 1; j < state.balls.length; j++) {
                        const b1 = state.balls[i], b2 = state.balls[j];
                        if (!b1.potted && !b2.potted) b1.resolve(b2);
                    }
                }
            }

            for (let b of state.balls) {
                if (b.potted || b.wasPotted) continue;
                for (let p of POCKETS) {
                    if (Math.hypot(b.x - p[0], b.y - p[1]) < POCKET_RADIUS - 5) {
                        b.potted = true;
                        b.vx = 0; b.vy = 0;
                        state.ballsPottedThisTurn.push(b);
                        handlePotted(b);
                        break;
                    }
                }
            }
        }

        function anyMoving() {
            return state.balls.some(b => !b.potted && b.moving);
        }

        // ==========================================
        // FIXED: SCRATCH HANDLING WITH PROPER SYNC
        // ==========================================
        function handlePotted(ball) {
            if (ball.type !== 'cue') {
                // Handle object balls
                if (!state.assignedType && !state.isSolo && ball.type !== 'eight') {
                    if (state.isMyTurn) {
                        state.myType = ball.type;
                        state.opponentType = ball.type === 'solid' ? 'stripe' : 'solid';
                    } else {
                        state.opponentType = ball.type;
                        state.myType = ball.type === 'solid' ? 'stripe' : 'solid';
                    }
                    state.assignedType = true;
                } else if (ball.type === 'eight') {
                    const remaining = state.balls.filter(b => 
                        b.type === state.myType && !b.potted && b !== ball
                    ).length;
                    endGame(remaining === 0, remaining === 0 ? '8-ball sunk!' : 'Too early!');
                }
                return;
            }

            // CUE BALL SCRATCH - FIXED
            if (state.scratchInProgress) return; // Prevent double handling
            state.scratchInProgress = true;

            showError('Scratch! Cue ball respawned.');
            
            // Determine respawn position (kitchen area - left side)
            const respawnX = 150;
            const respawnY = TABLE_HEIGHT / 2;

            // Respawn immediately on local
            ball.potted = false;
            ball.x = respawnX;
            ball.y = respawnY;
            ball.vx = 0;
            ball.vy = 0;
            ball.wasPotted = false;

            console.log(`Scratch handled. Cue ball respawned at (${respawnX}, ${respawnY})`);

            // CRITICAL: Send respawn to opponent immediately
            if (!state.isSolo && state.conn && state.conn.open) {
                state.conn.send({
                    type: 'CUE_RESPAWN',  // NEW: Dedicated message type
                    x: respawnX,
                    y: respawnY,
                    scratch: true,
                    nextTurn: !state.isMyTurn  // Who plays next
                });
                console.log('Sent CUE_RESPAWN to opponent');
            }

            // Reset flag after short delay
            setTimeout(() => {
                state.scratchInProgress = false;
            }, 100);
        }

        function endTurn() {
            console.log("=== END TURN ===");
            
            if (state.isSolo) {
                state.isMyTurn = true;
                state.ballsPottedThisTurn = [];
                updateUI();
                return;
            }

            const scratch = state.cueBall.potted;
            const myPotted = state.ballsPottedThisTurn.filter(b => b.type === state.myType).length;
            const theirPotted = state.ballsPottedThisTurn.filter(b => b.type === state.opponentType).length;
            const eightPotted = state.ballsPottedThisTurn.some(b => b.type === 'eight');

            let continueTurn = false;

            if (scratch) {
                continueTurn = false;
                console.log("Scratch detected in endTurn - turn passes");
            } else if (eightPotted) {
                continueTurn = false;
            } else if (theirPotted > 0 && myPotted === 0) {
                continueTurn = false;
            } else if (myPotted > 0) {
                continueTurn = true;
            } else {
                continueTurn = false;
            }

            if (!continueTurn) {
                state.isMyTurn = false;
                if (state.conn && state.conn.open) {
                    state.conn.send({
                        type: 'TURN_PASS',
                        balls: state.balls.map(b => ({
                            id: b.id, x: b.x, y: b.y, 
                            vx: b.vx, vy: b.vy, potted: b.potted
                        }))
                    });
                }
            }

            state.ballsPottedThisTurn = [];
            state.balls.forEach(b => b.wasPotted = b.potted);
            updateUI();
        }

        // ==========================================
        // NETWORKING - FIXED WITH CUE_RESPAWN HANDLER
        // ==========================================
        function initPeer() {
            const randomId = Math.floor(1000 + Math.random() * 9000).toString();
            state.peer = new Peer(randomId, {
                config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
            });
            
            setTimeout(() => {
                if (!state.myId) document.getElementById('my-id').innerHTML = '<span style="color:#ff6666">Timeout</span>';
            }, 15000);

            state.peer.on('open', id => {
                state.myId = id;
                document.getElementById('my-id').innerHTML = `
                    <div class="code-display">${id}</div>
                    <button class="copy-btn" onclick="navigator.clipboard.writeText('${id}')">Copy</button>
                `;
                document.getElementById('join-id').disabled = false;
                document.getElementById('join-btn').disabled = false;
            });

            state.peer.on('connection', conn => {
                state.isHost = true;
                state.myType = 'solid';
                setupConn(conn);
                startGame();
            });
        }

        function connect() {
            const id = document.getElementById('join-id').value.trim();
            if (!id || id.length !== 4) return alert('Enter 4-digit code');
            
            state.isHost = false;
            state.myType = 'stripe';
            const conn = state.peer.connect(id, { reliable: true });
            document.getElementById('my-id').innerHTML = '<span class="spinner"></span> Connecting...';
            setupConn(conn);
        }

        function setupConn(conn) {
            state.conn = conn;
            conn.on('open', () => { if (!state.isHost) startGame(); });
            
            conn.on('data', data => {
                console.log("Received:", data.type, data);
                
                if (data.type === 'TURN_PASS') {
                    state.isMyTurn = true;
                    state.canShoot = true;
                    if (data.balls) {
                        data.balls.forEach(s => {
                            const b = state.balls.find(x => x.id === s.id);
                            if (b) {
                                b.x = s.x; b.y = s.y; 
                                b.vx = s.vx; b.vy = s.vy; 
                                b.potted = s.potted;
                            }
                        });
                    }
                    updateUI();
                    
                } else if (data.type === 'SHOT' && state.cueBall) {
                    state.cueBall.vx = data.vx;
                    state.cueBall.vy = data.vy;
                    state.isMyTurn = false;
                    updateUI();
                    
                } else if (data.type === 'CUE_RESPAWN') {
                    // FIXED: Handle opponent's scratch
                    console.log('Received CUE_RESPAWN:', data);
                    
                    if (state.cueBall) {
                        state.cueBall.potted = false;
                        state.cueBall.x = data.x;
                        state.cueBall.y = data.y;
                        state.cueBall.vx = 0;
                        state.cueBall.vy = 0;
                        state.cueBall.wasPotted = false;
                        
                        console.log(`Opponent scratched, cue ball respawned at (${data.x}, ${data.y})`);
                        
                        // If nextTurn is true, it's our turn now
                        if (data.nextTurn === true) {
                            state.isMyTurn = true;
                            state.canShoot = true;
                            showError('Opponent scratched! Your turn.');
                        }
                    }
                    updateUI();
                }
            });
        }

        // ==========================================
        // INPUT
        // ==========================================
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = TABLE_WIDTH / rect.width;
            const scaleY = TABLE_HEIGHT / rect.height;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        function onPointerDown(e) {
            if (!state.isMyTurn || anyMoving() || !state.gameActive || !state.canShoot) return;

            const pos = getPos(e);
            const dist = Math.hypot(pos.x - state.cueBall.x, pos.y - state.cueBall.y);
            
            if (dist < BALL_RADIUS * 5) {
                state.isDragging = true;
                state.dragStart = pos;
                state.dragCurrent = pos;
                
                document.getElementById('power-meter').style.display = 'block';
                document.getElementById('power-fill').style.width = '0%';
                
                e.preventDefault();
                e.stopPropagation();
            }
        }

        function onPointerMove(e) {
            const pos = getPos(e);
            state.mousePos = pos;

            if (state.isDragging) {
                state.dragCurrent = pos;
                
                const dx = state.dragStart.x - pos.x;
                const dy = state.dragStart.y - pos.y;
                const dragDist = Math.hypot(dx, dy);
                const powerPercent = Math.min(dragDist / 150 * 100, 100);
                
                document.getElementById('power-fill').style.width = powerPercent + '%';
                
                e.preventDefault();
                e.stopPropagation();
            }
        }

        function onPointerUp(e) {
            if (!state.isDragging) return;
            
            state.isDragging = false;
            document.getElementById('power-meter').style.display = 'none';
            
            const dx = state.dragStart.x - state.dragCurrent.x;
            const dy = state.dragStart.y - state.dragCurrent.y;
            const dist = Math.hypot(dx, dy);
            
            if (dist > 15) {
                const power = Math.min(dist * 0.5, MAX_POWER);
                const angle = Math.atan2(dy, dx);
                
                state.cueBall.vx = Math.cos(angle) * power;
                state.cueBall.vy = Math.sin(angle) * power;
                state.canShoot = false;
                
                if (!state.isSolo && state.conn) {
                    state.conn.send({
                        type: 'SHOT',
                        vx: state.cueBall.vx,
                        vy: state.cueBall.vy
                    });
                }
            }
        }

        canvas.addEventListener('mousedown', onPointerDown, { passive: false });
        canvas.addEventListener('mousemove', onPointerMove, { passive: false });
        canvas.addEventListener('mouseup', onPointerUp, { passive: false });
        canvas.addEventListener('touchstart', onPointerDown, { passive: false });
        canvas.addEventListener('touchmove', onPointerMove, { passive: false });
        canvas.addEventListener('touchend', onPointerUp, { passive: false });
        canvas.addEventListener('touchcancel', onPointerUp, { passive: false });

        // ==========================================
        // RENDERING
        // ==========================================
        function resize() {
            const container = document.getElementById('canvas-container');
            const aspect = TABLE_WIDTH / TABLE_HEIGHT;
            let w = container.clientWidth - 40;
            let h = w / aspect;
            if (h > container.clientHeight - 40) { h = container.clientHeight - 40; w = h * aspect; }
            canvas.width = TABLE_WIDTH;
            canvas.height = TABLE_HEIGHT;
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';
        }

        function draw() {
            ctx.fillStyle = '#1a4d2e';
            ctx.fillRect(0, 0, TABLE_WIDTH, TABLE_HEIGHT);

            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 20;
            ctx.strokeRect(0, 0, TABLE_WIDTH, TABLE_HEIGHT);

            ctx.fillStyle = '#0d1117';
            for (let p of POCKETS) {
                ctx.beginPath();
                ctx.arc(p[0], p[1], POCKET_RADIUS, 0, Math.PI * 2);
                ctx.fill();
            }

            for (let b of state.balls) b.draw(ctx);

            // Draw cue stick when my turn and cue ball exists and not moving
            if (state.isMyTurn && !anyMoving() && state.cueBall && !state.cueBall.potted) {
                drawCueStick();
            }
        }

        function drawCueStick() {
            const cue = state.cueBall;
            let angle;
            let offset = BALL_RADIUS + 30;

            if (state.isDragging && state.dragCurrent) {
                const dx = state.dragStart.x - state.dragCurrent.x;
                const dy = state.dragStart.y - state.dragCurrent.y;
                const power = Math.min(Math.hypot(dx, dy), 150);
                angle = Math.atan2(dy, dx);
                offset = BALL_RADIUS + 30 + power * 0.4;
                
                ctx.strokeStyle = `rgba(255,255,255,${0.3 + power / 300})`;
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(cue.x, cue.y);
                ctx.lineTo(
                    cue.x + Math.cos(angle) * (100 + power),
                    cue.y + Math.sin(angle) * (100 + power)
                );
                ctx.stroke();
                ctx.setLineDash([]);
            } else {
                angle = Math.atan2(state.mousePos.y - cue.y, state.mousePos.x - cue.x);
            }

            const len = 180;
            const startX = cue.x - Math.cos(angle) * (len + offset);
            const startY = cue.y - Math.sin(angle) * (len + offset);
            const endX = cue.x - Math.cos(angle) * offset;
            const endY = cue.y - Math.sin(angle) * offset;

            ctx.strokeStyle = '#d4a574';
            ctx.lineWidth = 8;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.lineTo(endX, endY);
            ctx.stroke();

            ctx.strokeStyle = '#3e2723';
            ctx.lineWidth = 10;
            ctx.beginPath();
            ctx.moveTo(endX - Math.cos(angle) * 10, endY - Math.sin(angle) * 10);
            ctx.lineTo(endX, endY);
            ctx.stroke();
        }

        // ==========================================
        // MAIN LOOP
        // ==========================================
        function loop() {
            if (!state.gameActive) return;

            updatePhysics();

            if (!state.canShoot && !anyMoving()) {
                state.canShoot = true;
                endTurn();
            }

            draw();
            requestAnimationFrame(loop);
        }

        // ==========================================
        // UI
        // ==========================================
        function updateUI() {
            const p1 = document.getElementById('p1-badge');
            const p2 = document.getElementById('p2-badge');
            const turn = document.getElementById('turn-indicator');

            if (state.isSolo) {
                p1.className = 'player-badge solid active';
                p1.textContent = '● Practice';
                p2.style.display = 'none';
            } else {
                p1.textContent = state.isHost ? '● You' : '● Opp';
                p2.textContent = state.isHost ? '○ Opp' : '○ You';
                p1.className = 'player-badge solid' + (state.isMyTurn ? ' active' : '');
                p2.className = 'player-badge stripe' + (!state.isMyTurn ? ' active' : '');
            }

            turn.textContent = state.isMyTurn ? 
                (state.canShoot ? '★ YOUR TURN ★' : 'Moving...') : 
                "OPPONENT'S TURN";
            turn.style.color = state.isMyTurn ? 
                (state.canShoot ? '#00ff00' : '#ffaa00') : 
                '#ff6666';
        }

        function endGame(win, msg) {
            if (state.gameEnded) return;
            state.gameEnded = true;
            state.gameActive = false;
            document.getElementById('end-screen').style.display = 'flex';
            document.getElementById('end-title').textContent = win ? '🎉 You Win!' : '😔 You Lose';
            document.getElementById('end-title').style.color = win ? '#238636' : '#da3633';
            document.getElementById('end-msg').textContent = msg;
        }

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }

        function startGame() {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('game-ui').style.display = 'flex';
            document.getElementById('canvas-container').style.display = 'flex';
            resize();
            initRack();
            state.gameActive = true;
            state.canShoot = true;
            state.isMyTurn = state.isHost;
            updateUI();
            loop();
        }

        function startSolo() {
            state.isSolo = true;
            state.isHost = true;
            state.myType = 'solid';
            startGame();
        }

        window.addEventListener('load', initPeer);
        window.addEventListener('resize', resize);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café Gaming - Staff</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #1a1a2e;
            color: white;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        
        h1 {
            color: #eec27e;
            text-align: center;
            margin-bottom: 5px;
        }
        
        .subtitle {
            text-align: center;
            color: #8b949e;
            margin-bottom: 30px;
        }
        
        .card {
            background: #16213e;
            border: 2px solid #0f3460;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
        }
        
        h2 {
            color: #eec27e;
            margin-bottom: 20px;
        }
        
        .quick-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }
        
        button {
            background: #eec27e;
            color: #1a1a2e;
            border: none;
            padding: 20px;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
        }
        
        button:hover {
            transform: scale(1.02);
        }
        
        .quick-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .quick-btn .time { font-size: 1.4em; }
        .quick-btn .price { font-size: 0.85em; color: #5d4037; }
        
        label {
            display: block;
            color: #8b949e;
            margin-bottom: 8px;
        }
        
        select, input {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #0f3460;
            background: #0d1117;
            color: white;
            font-size: 1.1em;
            margin-bottom: 15px;
        }
        
        .full-btn {
            width: 100%;
            padding: 18px;
            font-size: 1.2em;
            margin-top: 10px;
        }
        
        #result {
            display: none;
            margin-top: 25px;
        }
        
        .code-box {
            background: linear-gradient(135deg, #238636 0%, #2ea043 100%);
            color: white;
            padding: 40px;
            text-align: center;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        
        .code-display {
            font-size: 4em;
            font-weight: bold;
            letter-spacing: 12px;
            font-family: monospace;
        }
        
        .action-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        .secondary {
            background: transparent;
            border: 2px solid #eec27e;
            color: #eec27e;
        }
        
        .secondary:hover {
            background: #eec27e;
            color: #1a1a2e;
        }
        
        .danger {
            background: #da3633;
            color: white;
        }
        
        .session-item {
            background: #0d1117;
            padding: 18px;
            border-radius: 10px;
            margin-bottom: 12px;
            border-left: 5px solid #238636;
            position: relative;
        }
        
        .session-item.expired {
            border-left-color: #da3633;
            opacity: 0.6;
        }
        
        .session-code {
            font-size: 1.5em;
            font-weight: bold;
            color: #eec27e;
            font-family: monospace;
        }
        
        .session-timer {
            position: absolute;
            right: 18px;
            top: 18px;
            background: rgba(0,0,0,0.3);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.9em;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-box {
            background: #0d1117;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #eec27e;
        }
        
        .stat-label {
            color: #8b949e;
            font-size: 0.85em;
        }
        
        .badge {
            background: #eec27e;
            color: #1a1a2e;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            margin-left: 10px;
        }
        
        @media print {
            body { background: white; color: black; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .code-box { 
                background: white !important; 
                color: black !important;
                border: 4px solid black;
            }
        }
    </style>
</head>
<body>
    <h1>☕ Café Gaming</h1>
    <p class="subtitle">Staff Terminal</p>
    
    <div class="card no-print">
        <h2>⚡ Quick Generate</h2>
        <div class="quick-grid">
            <button class="quick-btn" onclick="generate(15, 0)">
                <span class="time">15 MIN</span>
                <span class="price">FREE</span>
            </button>
            <button class="quick-btn" onclick="generate(30, 5)">
                <span class="time">30 MIN</span>
                <span class="price">$5</span>
            </button>
            <button class="quick-btn" onclick="generate(60, 8)">
                <span class="time">1 HOUR</span>
                <span class="price">$8</span>
            </button>
            <button class="quick-btn" onclick="generate(120, 12)">
                <span class="time">2 HOURS</span>
                <span class="price">$12</span>
            </button>
        </div>
        
        <h2>⚙️ Custom</h2>
        <label>Duration</label>
        <select id="customTime">
            <option value="15">15 minutes</option>
            <option value="30">30 minutes</option>
            <option value="60" selected>1 hour</option>
            <option value="120">2 hours</option>
            <option value="240">4 hours</option>
        </select>
        
        <label>Price ($)</label>
        <input type="number" id="customPrice" value="8" min="0" step="0.5">
        
        <label>Note (optional)</label>
        <input type="text" id="tableNote" placeholder="Table number, name, etc.">
        
        <button class="full-btn" onclick="customGenerate()">GENERATE CODE</button>
        
        <div id="result">
            <div class="code-box">
                <div class="code-display" id="codeText">ABC123</div>
                <div style="margin-top: 15px;">
                    Valid for <span id="durationText">60 minutes</span>
                </div>
            </div>
            
            <div class="action-row">
                <button class="secondary" onclick="printReceipt()">🖨️ Print</button>
                <button onclick="newCode()">New Code</button>
            </div>
        </div>
    </div>
    
    <div class="card no-print">
        <h2>📋 Active Sessions <span class="badge" id="activeCount">0</span></h2>
        
        <div class="stats">
            <div class="stat-box">
                <div class="stat-number" id="statToday">0</div>
                <div class="stat-label">Today</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="statActive">0</div>
                <div class="stat-label">Active</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="statRevenue">$0</div>
                <div class="stat-label">Revenue</div>
            </div>
        </div>
        
        <div id="sessionList"></div>
        
        <button class="danger full-btn" onclick="clearExpired()" style="margin-top: 15px;">
            🗑️ Clear Expired
        </button>
    </div>
    
    <div class="print-only" style="display: none; text-align: center; padding: 40px;">
        <h1 style="font-size: 3em; margin-bottom: 20px;">☕ CAFÉ GAMING</h1>
        <p style="font-size: 1.5em; margin-bottom: 30px;">Your Access Code</p>
        <div id="printCode" style="font-size: 5em; font-weight: bold; letter-spacing: 15px; border: 4px solid black; padding: 40px; margin: 30px 0;"></div>
        <p id="printDuration" style="font-size: 1.3em;"></p>
        <p style="margin-top: 50px; color: #666;">Enter at: <span id="printURL"></span></p>
    </div>

    <script>
        const STORAGE_KEY = 'cafe_sessions';
        let currentCode = null;
        
        function randomCode() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let code = '';
            for (let i = 0; i < 6; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return code;
        }
        
        function generate(minutes, price) {
            createCode(minutes, price, '');
        }
        
        function customGenerate() {
            const minutes = parseInt(document.getElementById('customTime').value);
            const price = parseFloat(document.getElementById('customPrice').value) || 0;
            const note = document.getElementById('tableNote').value;
            createCode(minutes, price, note);
        }
        
        function createCode(minutes, price, note) {
            currentCode = randomCode();
            
            const session = {
                code: currentCode,
                minutes: minutes,
                price: price,
                note: note,
                created: Date.now(),
                expires: Date.now() + (minutes * 60 * 1000),
                used: false
            };
            
            const sessions = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            sessions.push(session);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
            
            document.getElementById('codeText').textContent = currentCode;
            document.getElementById('durationText').textContent = minutes + ' minutes';
            document.getElementById('result').style.display = 'block';
            
            updateList();
        }
        
        function printReceipt() {
            const url = window.location.href.replace('admin.html', '');
            document.getElementById('printCode').textContent = currentCode;
            document.getElementById('printDuration').textContent = 'Valid for ' + document.getElementById('durationText').textContent;
            document.getElementById('printURL').textContent = url || 'cafe-gaming.github.io';
            window.print();
        }
        
        function newCode() {
            document.getElementById('result').style.display = 'none';
            document.getElementById('tableNote').value = '';
        }
        
        function updateList() {
            const sessions = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            const now = Date.now();
            const today = new Date().setHours(0,0,0,0);
            
            const todaySessions = sessions.filter(s => s.created >= today);
            const activeSessions = sessions.filter(s => s.expires > now && !s.used);
            const revenue = todaySessions.reduce((sum, s) => sum + (s.price || 0), 0);
            
            document.getElementById('statToday').textContent = todaySessions.length;
            document.getElementById('statActive').textContent = activeSessions.length;
            document.getElementById('statRevenue').textContent = '$' + revenue.toFixed(0);
            document.getElementById('activeCount').textContent = activeSessions.length;
            
            const list = document.getElementById('sessionList');
            const sorted = [...activeSessions].sort((a, b) => b.created - a.created);
            
            list.innerHTML = sorted.slice(0, 8).map(s => {
                const remaining = Math.ceil((s.expires - now) / 60000);
                return `
                    <div class="session-item">
                        <div class="session-timer">${remaining}m left</div>
                        <div class="session-code">${s.code}</div>
                        <div style="color: #8b949e; font-size: 0.9em; margin-top: 5px;">
                            ${s.minutes} min • $${s.price || 0} • ${s.note || '-'}
                        </div>
                    </div>
                `;
            }).join('') || '<div style="color: #666; text-align: center; padding: 20px;">No active sessions</div>';
        }
        
        function clearExpired() {
            const sessions = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            const active = sessions.filter(s => s.expires > Date.now());
            localStorage.setItem(STORAGE_KEY, JSON.stringify(active));
            updateList();
        }
        
        setInterval(updateList, 10000);
        updateList();
    </script>
</body>
</html>

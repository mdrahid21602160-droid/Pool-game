<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Tic-Tac-Toe</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin:0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #board { display: grid; grid-template-columns: repeat(3, 100px); gap: 10px; margin-top: 20px; }
        .sq { width: 100px; height: 100px; background: #161b22; border: 2px solid #30363d; display: flex; align-items: center; justify-content: center; font-size: 3rem; cursor: pointer; border-radius: 10px; }
        #setup { position: fixed; inset: 0; background: #0d1117; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn { background: #eec27e; color: #3e2e14; padding: 15px 30px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #my-id { font-size: 3.5rem; font-weight: bold; margin: 15px; color: #fff; text-shadow: 0 0 10px #eec27e; }
    </style>
</head>
<body>
    <div id="setup">
        <h1 style="color: #eec27e">TTT LOBBY</h1>
        <div id="my-id">LOADING...</div>
        <input type="number" id="join-id" placeholder="Friend's Code" style="padding:12px; border-radius:8px; margin-bottom:10px; text-align:center;">
        <button class="btn" onclick="connect()">CONNECT & START</button>
        <button onclick="start()" style="margin-top:20px; color:#eec27e; background:none; border:none; text-decoration:underline;">Practice Mode</button>
    </div>
    <div id="turn" style="font-size: 1.5rem; color: #eec27e;">WAITING...</div>
    <div id="board"></div>

<script>
    const boardEl = document.getElementById('board');
    let state = Array(9).fill('');
    let isMyTurn = true, myChar = 'X', conn = null;

    const peer = new Peer(Math.floor(1000 + Math.random()*9000).toString());
    peer.on('open', id => document.getElementById('my-id').innerText = id);
    peer.on('connection', c => { conn = c; isMyTurn = true; myChar = 'X'; start(); });

    function connect() { 
        const tid = document.getElementById('join-id').value;
        if(!tid) return alert("Enter Code");
        conn = peer.connect(tid); myChar = 'O'; isMyTurn = false; start(); 
    }

    function start() {
        document.getElementById('setup').style.display = 'none';
        render();
        if(conn) {
            conn.on('open', () => {
                conn.on('data', d => { state = d.state; isMyTurn = true; render(); });
            });
        }
    }

    function render() {
        boardEl.innerHTML = '';
        document.getElementById('turn').innerText = isMyTurn ? "★ YOUR TURN ( " + myChar + " ) ★" : "OPPONENT'S TURN";
        state.forEach((val, i) => {
            const s = document.createElement('div');
            s.className = 'sq';
            s.innerText = val;
            s.onclick = () => {
                if(!isMyTurn || state[i]) return;
                state[i] = myChar;
                if(conn) { isMyTurn = false; conn.send({state}); }
                render();
            };
            boardEl.appendChild(s);
        });
    }
</script>
</body>
</html>

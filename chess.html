<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P2P Chess</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        :root { --sq: min(12vw, 52px); --gold: #eec27e; --dark: #0d1117; --card: #161b22; --border: #30363d; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin:0; display: flex; flex-direction: column; align-items: center; }
        
        #board { display: grid; grid-template-columns: repeat(8, var(--sq)); border: 4px solid #333; margin-top: 15px; }
        .sq { width: var(--sq); height: var(--sq); display: flex; align-items: center; justify-content: center; font-size: calc(var(--sq) * 0.7); cursor: pointer; }
        .l { background: #f0d9b5; color: #b58863; } .d { background: #b58863; color: #f0d9b5; }
        .sel { background: #bbcb2b !important; }
        .valid { background: #96bb2b !important; }

        /* Setup/Lobby */
        #setup { position: fixed; inset: 0; background: rgba(13,17,23,0.98); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .code-display { font-family: 'Courier New', monospace; background: #000; color: var(--gold); padding: 15px 30px; border-radius: 8px; letter-spacing: 5px; font-size: 2.5rem; border: 2px solid var(--gold); margin: 20px 0; font-weight: bold; }
        .btn { background: var(--gold); color: #3e2e14; padding: 15px 30px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        input { padding: 15px; text-align: center; border-radius: 8px; background: #111; color: white; border: 1px solid var(--border); width: 200px; margin-bottom:10px; }
        
        /* Chat */
        #chat-container { position: fixed; bottom: 10px; right: 10px; width: 250px; height: 300px; background: var(--card); border: 1px solid var(--border); display: flex; flex-direction: column; border-radius: 8px; z-index: 90; }
        #chat-msgs { flex-grow: 1; overflow-y: scroll; padding: 10px; font-size: 12px; }
        #chat-input { border: none; padding: 10px; background: var(--dark); color: white; border-top: 1px solid var(--border); }
        
        .spinner { display: inline-block; width: 30px; height: 30px; border: 4px solid rgba(238, 194, 126, 0.3); border-radius: 50%; border-top-color: var(--gold); animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="setup">
        <h1 style="color:var(--gold)">CHESS</h1>
        <div id="my-id"><span class="spinner"></span></div>
        <input type="number" id="join-id" placeholder="Friend's Code">
        <button class="btn" onclick="connect()">JOIN</button>
    </div>

    <div id="turn" style="background:var(--card); width:100%; padding:15px; text-align:center; color:var(--gold); font-weight:bold;">WAITING...</div>
    <div id="board"></div>

    <div id="chat-container">
        <div id="chat-msgs"></div>
        <input type="text" id="chat-input" placeholder="Type message...">
    </div>

<script>
    const boardEl = document.getElementById('board');
    const chatMsgs = document.getElementById('chat-msgs');
    const chatInput = document.getElementById('chat-input');
    
    // Initialize Chess.js
    const game = new Chess();
    const icons = {'w':{'r':'♖','n':'♘','b':'♗','q':'♕','k':'♔','p':'♙'}, 'b':{'r':'♜','n':'♞','b':'♝','q':'♛','k':'♚','p':'♟'}};
    
    let isMyTurn = true, myCol = 'w', conn = null, sel = null;
    
    const peer = new Peer(Math.floor(1000 + Math.random()*9000).toString());
    
    let connectionTimeout = setTimeout(() => {
        document.getElementById('my-id').innerHTML = '<span style="color:red; font-size:1rem;">Slow connection. Please reload.</span>';
    }, 15000);

    peer.on('open', id => {
        clearTimeout(connectionTimeout);
        document.getElementById('my-id').innerHTML = `<div class="code-display">${id}</div>`;
    });
    
    peer.on('connection', c => { conn = c; isMyTurn = true; myCol = 'w'; setupConn(); start(); });
    
    function connect() { const tid = document.getElementById('join-id').value; conn = peer.connect(tid); myCol = 'b'; isMyTurn = false; setupConn(); start(); }
    
    function setupConn() {
        conn.on('open', () => {
            conn.on('data', d => {
                if(d.type === 'CHAT') {
                    addMessage('Friend', d.msg);
                } else {
                    // Update the game state with the FEN string from opponent
                    game.load(d.fen); 
                    isMyTurn = true; 
                    render();
                }
            });
        });
    }

    function start() { document.getElementById('setup').style.display='none'; render(); }

    // Chat Logic
    chatInput.addEventListener('keypress', (e) => {
        if(e.key === 'Enter' && conn) {
            const msg = chatInput.value;
            if(msg.trim() === "") return;
            conn.send({type: 'CHAT', msg: msg});
            addMessage('You', msg);
            chatInput.value = '';
        }
    });

    function addMessage(user, msg) {
        chatMsgs.innerHTML += `<div><strong>${user}:</strong> ${msg}</div>`;
        chatMsgs.scrollTop = chatMsgs.scrollHeight;
    }
    
    function render() {
        boardEl.innerHTML = '';
        
        let status = isMyTurn ? "★ YOUR TURN ★" : "OPPONENT'S TURN";
        if(game.game_over()) {
            if(game.in_checkmate()) status = "CHECKMATE! " + (isMyTurn ? "YOU LOSE!" : "YOU WIN!");
            else if(game.in_draw()) status = "DRAW!";
            else status = "GAME OVER";
        }
        document.getElementById('turn').innerText = status;

        const board = game.board();
        const rows = myCol === 'b' ? [0,1,2,3,4,5,6,7] : [7,6,5,4,3,2,1,0];
        const cols = myCol === 'b' ? [7,6,5,4,3,2,1,0] : [0,1,2,3,4,5,6,7];

        for(let r of rows) for(let c of cols) {
            const square = String.fromCharCode(97 + c) + (8 - r);
            const piece = board[r][c];
            const s = document.createElement('div');
            s.className = `sq ${(r+c)%2===0?'l':'d'}`;
            if(sel === square) s.classList.add('sel');
            
            // Highlight valid moves
            if(sel && game.moves({square: sel, verbose: true}).some(m => m.to === square)) {
                s.classList.add('valid');
            }

            if(piece) {
                s.innerText = icons[piece.color][piece.type];
                s.style.color = piece.color === 'w' ? "white" : "black";
            }
            
            s.onclick = () => {
                if(!isMyTurn || game.game_over()) return;
                
                if(sel) {
                    // Try to make the move
                    const move = game.move({ from: sel, to: square, promotion: 'q' });
                    if(move) {
                        isMyTurn = false;
                        if(conn) conn.send({ fen: game.fen() });
                        sel = null;
                        render();
                    } else {
                        // Invalid move, deselect or select new piece
                        sel = piece && piece.color === myCol ? square : null;
                        render();
                    }
                } else if(piece && piece.color === myCol) {
                    sel = square;
                    render();
                }
            };
            boardEl.appendChild(s);
        }
    }
</script>
</body>
</html>

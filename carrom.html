<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carrom Pro - Baseline Rules</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root {
            --gold: #ffd700;
            --gold-dark: #b8860b;
            --dark: #0a0e17;
            --card: #161b22;
            --border: #30363d;
            --red: #ff4444;
            --green: #00c853;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: none;
        }
        
        body {
            background: linear-gradient(135deg, #0d1f0d 0%, #1a3a1a 50%, #0d1f0d 100%);
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }
        
        #setup {
            position: fixed;
            inset: 0;
            background: rgba(10,14,23,0.98);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        #setup h1 {
            color: var(--gold);
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255,215,0,0.3);
        }
        
        .code-display {
            font-family: 'Courier New', monospace;
            background: #000;
            color: var(--gold);
            padding: 20px;
            border-radius: 12px;
            letter-spacing: 8px;
            font-size: 2.5rem;
            border: 2px solid var(--gold);
            margin: 20px 0;
            font-weight: bold;
        }
        
        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,215,0,0.2);
            border-radius: 50%;
            border-top-color: var(--gold);
            animation: spin 1s linear infinite;
            vertical-align: middle;
            margin-right: 10px;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        input {
            padding: 15px;
            text-align: center;
            border-radius: 10px;
            background: #111;
            color: white;
            border: 2px solid #333;
            font-size: 1.2rem;
            width: 200px;
            margin-bottom: 10px;
        }
        
        input:focus {
            outline: none;
            border-color: var(--gold);
        }
        
        .btn {
            background: linear-gradient(145deg, var(--gold), var(--gold-dark));
            color: #1a1500;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
            margin: 5px;
            transition: all 0.3s;
        }
        
        .btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255,215,0,0.4);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn.secondary {
            background: transparent;
            border: 2px solid #444;
            color: #888;
        }
        
        .btn.secondary:hover {
            border-color: var(--gold);
            color: var(--gold);
        }
        
        #game-ui {
            width: 100%;
            padding: 15px 20px;
            background: rgba(22,27,34,0.95);
            border-bottom: 2px solid var(--gold);
            display: none;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }
        
        .player-badge {
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 700;
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        
        .player-badge.white {
            background: linear-gradient(145deg, #fff, #e0e0e0);
            color: #000;
        }
        
        .player-badge.black {
            background: linear-gradient(145deg, #333, #111);
            color: #fff;
            border-color: #555;
        }
        
        .player-badge.active {
            box-shadow: 0 0 20px var(--gold);
            border-color: var(--gold);
            transform: scale(1.05);
        }
        
        #turn-indicator {
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        #turn-indicator.my-turn { color: var(--green); }
        #turn-indicator.opponent-turn { color: var(--red); }
        
        #game-container {
            position: relative;
            width: min(95vw, 90vh);
            height: min(95vw, 90vh);
            max-width: 600px;
            max-height: 600px;
            margin-top: 20px;
            display: none;
        }
        
        #board {
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #2d5016 0%, #1a3009 100%);
            border: 12px solid #4a3728;
            border-radius: 25px;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            overflow: hidden;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: grab;
            touch-action: none;
        }
        
        canvas:active { cursor: grabbing; }
        
        .pocket {
            position: absolute;
            width: 45px;
            height: 45px;
            background: radial-gradient(circle at 30% 30%, #444, #111);
            border-radius: 50%;
            box-shadow: inset 0 0 15px #000;
            border: 2px solid #5d4037;
            z-index: 5;
        }
        
        .pocket.tl { top: -12px; left: -12px; }
        .pocket.tr { top: -12px; right: -12px; }
        .pocket.bl { bottom: -12px; left: -12px; }
        .pocket.br { bottom: -12px; right: -12px; }
        
        #power-meter {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 180px;
            height: 10px;
            background: rgba(0,0,0,0.6);
            border-radius: 20px;
            overflow: hidden;
            display: none;
            border: 2px solid var(--gold);
            z-index: 10;
        }
        
        #power-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00ff00, #ffff00, #ff0000);
            transition: width 0.05s;
        }
        
        #msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            color: var(--gold);
            padding: 20px 40px;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: 700;
            pointer-events: none;
            opacity: 0;
            transition: all 0.3s;
            z-index: 20;
            border: 2px solid var(--gold);
            text-align: center;
            white-space: nowrap;
        }
        
        #msg.show { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        
        #end-screen {
            position: fixed;
            inset: 0;
            background: rgba(10,14,23,0.98);
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        #end-screen h1 {
            font-size: 3.5rem;
            color: var(--gold);
            margin-bottom: 20px;
        }
        
        .score-big {
            font-size: 2rem;
            margin: 20px;
            color: white;
        }
        
        .rules-hint {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: var(--gold);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            z-index: 15;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .rules-hint.show { opacity: 1; }
        
        @media (max-width: 600px) {
            #setup h1 { font-size: 2.5rem; }
            .code-display { font-size: 2rem; padding: 15px; letter-spacing: 5px; }
            #game-ui { font-size: 12px; }
            .player-badge { padding: 8px 15px; }
        }
    </style>
</head>
<body>
    <div id="setup">
        <h1>🎯 Carrom Pro</h1>
        <div id="my-id"><span class="spinner"></span> Connecting...</div>
        <p style="color: #666; margin: 10px 0;">Share your code with a friend</p>
        <input type="number" id="join-id" placeholder="Enter Friend's Code" disabled>
        <button class="btn" id="join-btn" onclick="connect()" disabled>JOIN MATCH</button>
        <button class="btn secondary" onclick="startSolo()" style="margin-top: 15px;">Practice Solo</button>
    </div>
    
    <div id="end-screen">
        <h1 id="end-msg">🏆 WINNER!</h1>
        <div class="score-big" id="final-score"></div>
        <button class="btn" onclick="location.reload()">PLAY AGAIN</button>
    </div>
    
    <div id="game-ui">
        <div class="player-badge white" id="badge-white">⚪ YOU: 0</div>
        <div id="turn-indicator">WAITING...</div>
        <div class="player-badge black" id="badge-black">⚫ OPP: 0</div>
    </div>
    
    <div id="game-container">
        <div id="board">
            <div class="pocket tl"></div>
            <div class="pocket tr"></div>
            <div class="pocket bl"></div>
            <div class="pocket br"></div>
            <canvas id="c"></canvas>
            <div id="msg"></div>
            <div id="power-meter"><div id="power-fill"></div></div>
            <div class="rules-hint" id="rules-hint">Place striker on your baseline</div>
        </div>
    </div>

<script>
// Game Constants
const CONSTANTS = {
    BOARD: 500,
    PIECE_R: 9,
    QUEEN_R: 9.5,
    STRIKER_R: 14,
    POCKET_R: 22,
    TOUCH_AREA: 60,
    MAX_POWER: 0.085,
    FRICTION_AIR: 0.018,
    RESTITUTION: 0.82,
    DENSITY_PIECE: 0.002,
    DENSITY_STRIKER: 0.003,
    WIN_SCORE: 9,
    BASELINE_Y_WHITE: 430,  // White player baseline (bottom)
    BASELINE_Y_BLACK: 70    // Black player baseline (top)
};

// Physics & Engine
const Engine = Matter.Engine,
      World = Matter.World,
      Bodies = Matter.Bodies,
      Body = Matter.Body,
      Events = Matter.Events,
      Composite = Matter.Composite;

// Game State
let state = {
    peer: null,
    conn: null,
    myId: null,
    isHost: false,
    engine: null,
    world: null,
    canvas: null,
    ctx: null,
    scale: 1,
    striker: null,
    pieces: [],
    queen: null,
    gameActive: false,
    myColor: null,
    currentPlayer: 'white',
    scores: { white: 0, black: 0 },
    isMyTurn: false,
    isDragging: false,
    dragStart: null,
    dragPos: null,
    touchId: null,
    syncInterval: null,
    turnInProgress: false,
    strikerOnBaseline: true  // Track if striker is positioned on baseline
};

// Initialize PeerJS
function initPeer() {
    const idDisplay = document.getElementById('my-id');
    const joinInput = document.getElementById('join-id');
    const joinBtn = document.getElementById('join-btn');
    
    idDisplay.innerHTML = '<span class="spinner"></span> Connecting...';
    
    const randomId = Math.floor(1000 + Math.random() * 9000).toString();
    
    state.peer = new Peer(randomId, {
        debug: 1,
        config: {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        }
    });
    
    const timeoutId = setTimeout(() => {
        if (!state.myId) {
            idDisplay.innerHTML = '<div style="color: #ff6666;">⚠️ Connection timeout<br><button class="btn" onclick="location.reload()" style="margin-top: 10px;">Retry</button></div>';
        }
    }, 10000);
    
    state.peer.on('open', id => {
        clearTimeout(timeoutId);
        state.myId = id;
        idDisplay.innerHTML = `<div class="code-display">${id}</div><button class="btn" onclick="copyCode()" style="margin-top: 10px; padding: 10px 20px; font-size: 0.9rem;">📋 Copy</button>`;
        joinInput.disabled = false;
        joinBtn.disabled = false;
    });
    
    state.peer.on('connection', connection => {
        state.isHost = true;
        state.myColor = 'white';
        state.conn = connection;
        setupConnection();
        startGame();
    });
    
    state.peer.on('error', err => {
        clearTimeout(timeoutId);
        idDisplay.innerHTML = `<div style="color: #ff6666;">⚠️ ${err.type}<br><button class="btn" onclick="location.reload()" style="margin-top: 10px;">Retry</button></div>`;
    });
}

function copyCode() {
    if (state.myId) {
        navigator.clipboard.writeText(state.myId).then(() => {
            event.target.textContent = '✓ Copied!';
            setTimeout(() => event.target.textContent = '📋 Copy', 2000);
        });
    }
}

function connect() {
    const friendId = document.getElementById('join-id').value;
    if (!friendId || friendId.length !== 4) {
        alert('Please enter a valid 4-digit code');
        return;
    }
    
    state.isHost = false;
    state.myColor = 'black';
    state.conn = state.peer.connect(friendId, { reliable: true, serialization: 'json' });
    
    document.getElementById('my-id').innerHTML = '<span class="spinner"></span> Connecting to friend...';
    setupConnection();
}

function setupConnection() {
    state.conn.on('open', () => {
        if (!state.isHost) startGame();
    });
    
    state.conn.on('data', data => handleNetworkData(data));
    
    state.conn.on('close', () => {
        if (state.gameActive) {
            alert('Opponent disconnected!');
            location.reload();
        }
    });
}

function handleNetworkData(data) {
    if (!data || !data.type) return;
    
    switch(data.type) {
        case 'SYNC':
            if (data.balls) syncGameState(data.balls);
            if (data.scores) {
                state.scores = data.scores;
                updateUI();
            }
            if (data.currentPlayer) {
                state.currentPlayer = data.currentPlayer;
                state.isMyTurn = (state.currentPlayer === state.myColor);
                updateTurnIndicator();
                // Reset striker to new player's baseline
                resetStrikerToBaseline();
            }
            break;
            
        case 'SHOOT':
            if (data.force && data.angle && state.striker && !state.turnInProgress) {
                applyRemoteShot(data.force, data.angle);
            }
            break;
            
        case 'WIN':
            endGame(false);
            break;
    }
}

function syncGameState(ballsData) {
    ballsData.forEach((ballData, i) => {
        if (i < state.pieces.length && state.pieces[i] && !state.pieces[i].isRemoved) {
            Body.setPosition(state.pieces[i], { x: ballData.x, y: ballData.y });
            Body.setVelocity(state.pieces[i], { x: ballData.vx, y: ballData.vy });
        }
    });
}

function applyRemoteShot(force, angle) {
    state.turnInProgress = true;
    state.strikerOnBaseline = false;
    Body.applyForce(state.striker, state.striker.position, {
        x: Math.cos(angle) * force,
        y: Math.sin(angle) * force
    });
    state.isMyTurn = false;
    updateTurnIndicator();
    setTimeout(() => waitForStop(), 500);
}

function startSolo() {
    state.isHost = true;
    state.myColor = 'white';
    startGame();
}

function startGame() {
    document.getElementById('setup').style.display = 'none';
    document.getElementById('game-ui').style.display = 'flex';
    document.getElementById('game-container').style.display = 'block';
    
    state.gameActive = true;
    state.isMyTurn = (state.myColor === 'white');
    state.currentPlayer = 'white';
    state.scores = { white: 0, black: 0 };
    state.turnInProgress = false;
    state.strikerOnBaseline = true;
    
    initPhysics();
    updateUI();
    updateTurnIndicator();
    
    if (state.isHost || state.conn) {
        state.syncInterval = setInterval(() => {
            if (state.conn && state.conn.open && state.isHost) {
                broadcastState();
            }
        }, 50);
    }
    
    showMessage(state.isMyTurn ? '🎯 Your Turn! Place striker on baseline' : '⏳ Waiting...');
}

function initPhysics() {
    state.canvas = document.getElementById('c');
    state.ctx = state.canvas.getContext('2d');
    
    resize();
    window.addEventListener('resize', resize);
    
    state.engine = Engine.create();
    state.engine.gravity.y = 0;
    state.engine.world.gravity.y = 0;
    state.world = state.engine.world;
    
    createBoard();
    createPieces();
    createStrikerOnBaseline();
    setupInputHandlers();
    
    Matter.Runner.run(state.engine);
    requestAnimationFrame(draw);
    
    setInterval(checkPockets, 16);
}

function resize() {
    const board = document.getElementById('board');
    const w = board.clientWidth - 6;
    state.canvas.width = w;
    state.canvas.height = w;
    state.scale = w / CONSTANTS.BOARD;
}

function createBoard() {
    const w = CONSTANTS.BOARD, t = 25;
    
    World.add(state.world, [
        Bodies.rectangle(w/2, -t/2, w, t, { 
            isStatic: true, 
            label: 'wall', 
            restitution: 0.9,
            friction: 0.1
        }),
        Bodies.rectangle(w/2, w+t/2, w, t, { 
            isStatic: true, 
            label: 'wall', 
            restitution: 0.9,
            friction: 0.1
        }),
        Bodies.rectangle(-t/2, w/2, t, w, { 
            isStatic: true, 
            label: 'wall', 
            restitution: 0.9,
            friction: 0.1
        }),
        Bodies.rectangle(w+t/2, w/2, t, w, { 
            isStatic: true, 
            label: 'wall', 
            restitution: 0.9,
            friction: 0.1
        })
    ]);
}

function createPieces() {
    state.pieces.forEach(p => World.remove(state.world, p));
    if (state.queen) World.remove(state.world, state.queen);
    state.pieces = [];
    
    const cx = CONSTANTS.BOARD/2, cy = CONSTANTS.BOARD/2;
    
    const createPiece = (x, y, type, isQueen = false) => {
        const r = isQueen ? CONSTANTS.QUEEN_R : CONSTANTS.PIECE_R;
        const body = Bodies.circle(x, y, r, {
            restitution: CONSTANTS.RESTITUTION,
            frictionAir: CONSTANTS.FRICTION_AIR,
            friction: 0.05,
            density: CONSTANTS.DENSITY_PIECE,
            label: isQueen ? 'queen' : type,
            isRemoved: false
        });
        World.add(state.world, body);
        state.pieces.push(body);
        return body;
    };
    
    state.queen = createPiece(cx, cy, null, true);
    
    for (let i = 0; i < 6; i++) {
        const angle = (i / 6) * Math.PI * 2;
        createPiece(
            cx + Math.cos(angle) * 28,
            cy + Math.sin(angle) * 28,
            i % 2 === 0 ? 'white' : 'black'
        );
    }
    
    for (let i = 0; i < 12; i++) {
        const angle = (i / 12) * Math.PI * 2 + Math.PI/12;
        createPiece(
            cx + Math.cos(angle) * 52,
            cy + Math.sin(angle) * 52,
            i % 2 === 0 ? 'black' : 'white'
        );
    }
}

// Create striker on the current player's baseline
function createStrikerOnBaseline() {
    if (state.striker) {
        World.remove(state.world, state.striker);
    }
    
    const baselineY = (state.currentPlayer === 'white') 
        ? CONSTANTS.BASELINE_Y_WHITE 
        : CONSTANTS.BASELINE_Y_BLACK;
    
    // Place at center of baseline
    state.striker = Bodies.circle(CONSTANTS.BOARD/2, baselineY, CONSTANTS.STRIKER_R, {
        restitution: CONSTANTS.RESTITUTION,
        frictionAir: 0.012,
        density: CONSTANTS.DENSITY_STRIKER,
        friction: 0.1,
        label: 'striker',
        isStatic: false
    });
    
    World.add(state.world, state.striker);
    state.strikerOnBaseline = true;
}

// Reset striker to baseline for new turn
function resetStrikerToBaseline() {
    if (state.striker) {
        World.remove(state.world, state.striker);
        state.striker = null;
    }
    
    // Only create striker if it's my turn
    if (state.isMyTurn) {
        createStrikerOnBaseline();
        showMessage("🎯 Your turn! Place striker on baseline");
    }
}

function setupInputHandlers() {
    const c = state.canvas;
    
    c.addEventListener('mousedown', onDown, { passive: false });
    c.addEventListener('touchstart', onDown, { passive: false });
    c.addEventListener('mousemove', onMove, { passive: false });
    c.addEventListener('touchmove', onMove, { passive: false });
    c.addEventListener('mouseup', onUp, { passive: false });
    c.addEventListener('touchend', onUp, { passive: false });
    c.addEventListener('touchcancel', onUp, { passive: false });
    c.addEventListener('mouseleave', onUp);
}

function getPos(e) {
    const r = state.canvas.getBoundingClientRect();
    let clientX, clientY;
    
    if (e.touches && e.touches.length > 0) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
    } else if (e.changedTouches && e.changedTouches.length > 0) {
        clientX = e.changedTouches[0].clientX;
        clientY = e.changedTouches[0].clientY;
    } else {
        clientX = e.clientX;
        clientY = e.clientY;
    }
    
    return {
        x: (clientX - r.left) / state.scale,
        y: (clientY - r.top) / state.scale
    };
}

function onDown(e) {
    e.preventDefault();
    
    if (!state.isMyTurn || !state.gameActive || !state.striker || state.turnInProgress) return;
    
    const p = getPos(e);
    const dist = Math.hypot(p.x - state.striker.position.x, p.y - state.striker.position.y);
    
    // Only allow dragging if touching the striker
    if (dist < CONSTANTS.TOUCH_AREA) {
        state.isDragging = true;
        state.dragStart = { x: state.striker.position.x, y: state.striker.position.y };
        state.dragPos = p;
        state.touchId = e.touches ? e.touches[0].identifier : 'mouse';
        
        document.getElementById('power-meter').style.display = 'block';
        state.canvas.style.cursor = 'grabbing';
        
        if (navigator.vibrate) navigator.vibrate(10);
    }
}

function onMove(e) {
    if (!state.isDragging) return;
    e.preventDefault();
    
    if (e.touches && e.touches.length > 0) {
        const touch = Array.from(e.touches).find(t => t.identifier === state.touchId);
        if (!touch) return;
    }
    
    state.dragPos = getPos(e);
    
    // Con striker to baseline while dragging
    const baselineY = (state.currentPlayer === 'white') 
        ? CONSTANTS.BASELINE_Y_WHITE 
        : CONSTANTS.BASELINE_Y_BLACK;
    
    // Calculate drag position but keep Y on baseline
    const dx = state.dragStart.x - state.dragPos.x;
    const dy = state.dragStart.y - state.dragPos.y;
    
    // Only use horizontal component for aiming, but keep striker on baseline
    const power = Math.min(Math.hypot(dx, dy), 180);
    
    document.getElementById('power-fill').style.width = (power / 180 * 100) + '%';
}

function onUp(e) {
    if (!state.isDragging) return;
    
    if (e.changedTouches && e.changedTouches.length > 0) {
        const touch = Array.from(e.changedTouches).find(t => t.identifier === state.touchId);
        if (!touch) return;
    }
    
    state.isDragging = false;
    state.touchId = null;
    document.getElementById('power-meter').style.display = 'none';
    document.getElementById('power-fill').style.width = '0%';
    state.canvas.style.cursor = 'grab';
    
    const dx = state.dragStart.x - state.dragPos.x;
    const dy = state.dragStart.y - state.dragPos.y;
    const dist = Math.hypot(dx, dy);
    
    if (dist < 15) return;
    
    const force = Math.min(dist * 0.0007, CONSTANTS.MAX_POWER);
    const angle = Math.atan2(dy, dx);
    
    // Apply force
    Body.applyForce(state.striker, state.striker.position, {
        x: Math.cos(angle) * force,
        y: Math.sin(angle) * force
    });
    
    state.turnInProgress = true;
    state.strikerOnBaseline = false;
    
    if (state.conn && state.conn.open) {
        state.conn.send({ type: 'SHOOT', force: force, angle: angle });
    }
    
    state.isMyTurn = false;
    updateTurnIndicator();
    
    setTimeout(() => waitForStop(), 400);
}

function waitForStop() {
    let checkCount = 0;
    const check = setInterval(() => {
        let moving = false;
        
        if (state.striker && (state.striker.speed > 0.02 || state.striker.angularSpeed > 0.01)) {
            moving = true;
        }
        
        for (let p of state.pieces) {
            if (!p.isRemoved && (p.speed > 0.02 || p.angularSpeed > 0.01)) {
                moving = true;
                break;
            }
        }
        
        checkCount++;
        
        if (checkCount > 100) {
            clearInterval(check);
            endTurn();
            return;
        }
        
        if (!moving) {
            clearInterval(check);
            endTurn();
        }
    }, 100);
}

function checkPockets() {
    if (!state.gameActive) return;
    
    const pocketOffset = 30;
    const pockets = [
        { x: pocketOffset, y: pocketOffset },
        { x: CONSTANTS.BOARD - pocketOffset, y: pocketOffset },
        { x: pocketOffset, y: CONSTANTS.BOARD - pocketOffset },
        { x: CONSTANTS.BOARD - pocketOffset, y: CONSTANTS.BOARD - pocketOffset }
    ];
    
    // Check striker
    if (state.striker && !state.striker.isRemoved) {
        for (let pocket of pockets) {
            const d = Math.hypot(state.striker.position.x - pocket.x, state.striker.position.y - pocket.y);
            if (d < CONSTANTS.POCKET_R - 5) {
                state.striker.isRemoved = true;
                World.remove(state.world, state.striker);
                state.striker = null;
                showMessage("⚠️ Foul! Striker pocketed");
                break;
            }
        }
    }
    
    // Check pieces
    for (let piece of state.pieces) {
        if (piece.isRemoved) continue;
        
        for (let pocket of pockets) {
            const d = Math.hypot(piece.position.x - pocket.x, piece.position.y - pocket.y);
            if (d < CONSTANTS.POCKET_R - 3) {
                piece.isRemoved = true;
                World.remove(state.world, piece);
                
                if (piece.label === 'queen') {
                    showMessage("👑 Queen pocketed!");
                } else {
                    showMessage(`${piece.label === 'white' ? '⚪' : '⚫'} ${piece.label} pocketed!`);
                }
                break;
            }
        }
    }
}

function endTurn() {
    if (!state.gameActive) return;
    
    const removedPieces = state.pieces.filter(p => p.isRemoved);
    const strikerRemoved = !state.striker;
    
    let myPiecesCount = 0;
    let opponentPiecesCount = 0;
    let queenRemoved = false;
    
    removedPieces.forEach(p => {
        state.pieces = state.pieces.filter(x => x !== p);
        
        if (p.label === state.currentPlayer) {
            myPiecesCount++;
            state.scores[state.currentPlayer]++;
        } else if (p.label === 'queen') {
            queenRemoved = true;
        } else {
            opponentPiecesCount++;
        }
    });
    
    // Handle striker foul
    if (strikerRemoved) {
        if (state.scores[state.currentPlayer] > 0) {
            state.scores[state.currentPlayer]--;
        }
        showMessage("⚠️ Foul! -1 point");
    }
    
    // Handle queen
    if (queenRemoved) {
        if (myPiecesCount > 0) {
            state.scores[state.currentPlayer] += 5;
            showMessage("👑 Queen covered! +5");
        } else {
            showMessage("⚠️ Queen not covered!");
            setTimeout(() => {
                if (state.gameActive) {
                    state.queen = Bodies.circle(
                        CONSTANTS.BOARD/2, 
                        CONSTANTS.BOARD/2, 
                        CONSTANTS.QUEEN_R,
                        {
                            restitution: CONSTANTS.RESTITUTION,
                            frictionAir: CONSTANTS.FRICTION_AIR,
                            friction: 0.05,
                            density: CONSTANTS.DENSITY_PIECE,
                            label: 'queen',
                            isRemoved: false
                        }
                    );
                    World.add(state.world, state.queen);
                    state.pieces.push(state.queen);
                }
            }, 500);
        }
    }
    
    // Check win condition
    if (state.scores.white >= CONSTANTS.WIN_SCORE) {
        endGame(state.myColor === 'white');
        return;
    } else if (state.scores.black >= CONSTANTS.WIN_SCORE) {
        endGame(state.myColor === 'black');
        return;
    }
    
    updateUI();
    broadcastState();
    
    // Determine next turn
    const foul = strikerRemoved || opponentPiecesCount > 0;
    const continueTurn = !foul && myPiecesCount > 0;
    
    setTimeout(() => {
        if (continueTurn) {
            // Same player continues - reset striker to their baseline
            state.isMyTurn = (state.currentPlayer === state.myColor);
            resetStrikerToBaseline();
            showMessage(state.isMyTurn ? "⚡ Continue! Place striker on baseline" : "⚡ Opponent continues!");
        } else {
            // Switch player - reset striker to new player's baseline
            state.currentPlayer = (state.currentPlayer === 'white') ? 'black' : 'white';
            state.isMyTurn = (state.currentPlayer === state.myColor);
            resetStrikerToBaseline();
            showMessage(state.isMyTurn ? "🎯 Your turn! Place striker on baseline" : "🎯 Opponent's turn!");
        }
        
        updateTurnIndicator();
        broadcastState();
        state.turnInProgress = false;
    }, strikerRemoved ? 1000 : 300);
}

function broadcastState() {
    if (!state.conn || !state.conn.open) return;
    
    const ballsData = state.pieces.map(p => ({
        x: p.position.x,
        y: p.position.y,
        vx: p.velocity.x,
        vy: p.velocity.y
    }));
    
    state.conn.send({
        type: 'SYNC',
        balls: ballsData,
        scores: state.scores,
        currentPlayer: state.currentPlayer
    });
}

function updateUI() {
    const whiteLabel = state.myColor === 'white' ? 'YOU' : 'OPP';
    const blackLabel = state.myColor === 'black' ? 'YOU' : 'OPP';
    
    document.getElementById('badge-white').textContent = `⚪ ${whiteLabel}: ${state.scores.white}`;
    document.getElementById('badge-black').textContent = `⚫ ${blackLabel}: ${state.scores.black}`;
    
    document.getElementById('badge-white').classList.toggle('active', state.currentPlayer === 'white');
    document.getElementById('badge-black').classList.toggle('active', state.currentPlayer === 'black');
}

function updateTurnIndicator() {
    const indicator = document.getElementById('turn-indicator');
    if (state.isMyTurn) {
        indicator.textContent = "★ YOUR TURN ★";
        indicator.className = "my-turn";
    } else {
        indicator.textContent = "OPPONENT'S TURN";
        indicator.className = "opponent-turn";
    }
}

function showMessage(text) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2500);
}

function endGame(win) {
    state.gameActive = false;
    clearInterval(state.syncInterval);
    
    const endScreen = document.getElementById('end-screen');
    const endMsg = document.getElementById('end-msg');
    const finalScore = document.getElementById('final-score');
    
    if (win) {
        endMsg.textContent = "🏆 YOU WIN!";
        endMsg.style.color = "var(--gold)";
    } else {
        endMsg.textContent = "😢 YOU LOSE!";
        endMsg.style.color = "#ff6666";
    }
    
    finalScore.textContent = `⚪ ${state.scores.white} — ${state.scores.black} ⚫`;
    endScreen.style.display = 'flex';
    
    if (state.conn && state.conn.open) {
        state.conn.send({ type: 'WIN' });
    }
}

function draw() {
    const ctx = state.ctx;
    const s = state.scale;
    const w = state.canvas.width;
    
    ctx.clearRect(0, 0, w, w);
    
    // Board background
    const gradient = ctx.createRadialGradient(w/2, w/2, 0, w/2, w/2, w/2);
    gradient.addColorStop(0, '#3d7020');
    gradient.addColorStop(1, '#1e3a12');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, w, w);
    
    // Draw baselines
    ctx.strokeStyle = 'rgba(255,215,0,0.6)';
    ctx.lineWidth = 3;
    
    // White baseline (bottom)
    const whiteY = CONSTANTS.BASELINE_Y_WHITE * s;
    ctx.beginPath();
    ctx.moveTo(30 * s, whiteY);
    ctx.lineTo((CONSTANTS.BOARD - 30) * s, whiteY);
    ctx.stroke();
    
    // Black baseline (top)
    const blackY = CONSTANTS.BASELINE_Y_BLACK * s;
    ctx.beginPath();
    ctx.moveTo(30 * s, blackY);
    ctx.lineTo((CONSTANTS.BOARD - 30) * s, blackY);
    ctx.stroke();
    
    // Center circle
    ctx.strokeStyle = 'rgba(255,215,0,0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(w/2, w/2, 45*s, 0, Math.PI*2);
    ctx.stroke();
    
    // Draw all bodies
    const bodies = Composite.allBodies(state.world);
    
    bodies.forEach(b => {
        if (b.label === 'wall') return;
        if (b.isRemoved) return;
        
        const x = b.position.x * s;
        const y = b.position.y * s;
        const r = b.circleRadius * s;
        
        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.arc(x + 2, y + 2, r, 0, Math.PI*2);
        ctx.fill();
        
        // Main body
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI*2);
        
        if (b.label === 'striker') {
            const grad = ctx.createRadialGradient(x-3, y-3, 0, x, y, r);
            grad.addColorStop(0, '#ffffff');
            grad.addColorStop(1, '#cccccc');
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.strokeStyle = '#999';
            ctx.lineWidth = 1;
            ctx.stroke();
            
            // Touch area indicator when on baseline
            if (state.isMyTurn && !state.isDragging && !state.turnInProgress && state.strikerOnBaseline) {
                ctx.strokeStyle = 'rgba(0,255,0,0.4)';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.arc(x, y, CONSTANTS.TOUCH_AREA*s, 0, Math.PI*2);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        } else if (b.label === 'white') {
            const grad = ctx.createRadialGradient(x-2, y-2, 0, x, y, r);
            grad.addColorStop(0, '#ffffff');
            grad.addColorStop(1, '#dddddd');
            ctx.fillStyle = grad;
            ctx.fill();
        } else if (b.label === 'black') {
            const grad = ctx.createRadialGradient(x-2, y-2, 0, x, y, r);
            grad.addColorStop(0, '#444444');
            grad.addColorStop(1, '#111111');
            ctx.fillStyle = grad;
            ctx.fill();
        } else if (b.label === 'queen') {
            const grad = ctx.createRadialGradient(x-2, y-2, 0, x, y, r);
            grad.addColorStop(0, '#ff5555');
            grad.addColorStop(1, '#990000');
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = 2;
            ctx.stroke();
        }
        
        // Shine
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.beginPath();
        ctx.arc(x - r*0.3, y - r*0.3, r*0.25, 0, Math.PI*2);
        ctx.fill();
    });
    
    // Aim line
    if (state.isDragging && state.striker) {
        const sx = state.striker.position.x * s;
        const sy = state.striker.position.y * s;
        const dx = state.dragStart.x - state.dragPos.x;
        const dy = state.dragStart.y - state.dragPos.y;
        const power = Math.min(Math.hypot(dx, dy), 180);
        const angle = Math.atan2(dy, dx);
        
        const aimLength = power * 2;
        const endX = sx + Math.cos(angle) * aimLength;
        const endY = sy + Math.sin(angle) * aimLength;
        
        const grad = ctx.createLinearGradient(sx, sy, endX, endY);
        grad.addColorStop(0, 'rgba(255,255,255,0.8)');
        grad.addColorStop(1, `rgba(255, ${255 - power}, 0, 0.5)`);
        
        ctx.strokeStyle = grad;
        ctx.lineWidth = 3;
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.lineTo(endX, endY);
        ctx.stroke();
        ctx.setLineDash([]);
    }
    
    requestAnimationFrame(draw);
}

window.onload = initPeer;

let lastTouchEnd = 0;
document.addEventListener('touchend', (e) => {
    const now = Date.now();
    if (now - lastTouchEnd <= 300) {
        e.preventDefault();
    }
    lastTouchEnd = now;
}, false);
</script>

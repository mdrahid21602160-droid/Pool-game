font-size: 1rem; transition: all 0.3s; min-width: 200px; } .btn:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 5px 20px rgba(255,215,0,0.4); } .btn:disabled { opacity: 0.5; cursor: not-allowed; } .btn.secondary { background: transparent; border: 2px solid #444; color: #888; } .btn.secondary:hover { border-color: var(--gold); color: var(--gold); } .copy-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-top: 10px; font-size: 0.9rem; } #game-ui { width: 100%; padding: 15px 20px; background: rgba(22,27,34,0.95); border-bottom: 2px solid var(--gold); display: none; justify-content: space-between; align-items: center; z-index: 10; } .player-badge { padding: 10px 20px; border-radius: 25px; font-weight: 700; border: 2px solid transparent; transition: all 0.3s; font-size: 0.9rem; } .player-badge.white { background: linear-gradient(145deg, #fff, #e0e0e0); color: #000; } .player-badge.black { background: linear-gradient(145deg, #333, #111); color: #fff; border-color: #555; } .player-badge.active { box-shadow: 0 0 20px var(--gold); border-color: var(--gold); transform: scale(1.05); } #turn-indicator { font-weight: 700; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px; } #turn-indicator.my-turn { color: var(--green); } #turn-indicator.opponent-turn { color: var(--red); } #turn-indicator.waiting { color: #888; } #game-container { position: relative; width: min(95vw, 90vh); height: min(95vw, 90vh); max-width: 600px; max-height: 600px; margin-top: 10px; display: none; } #board { width: 100%; height: 100%; background: linear-gradient(145deg, var(--board-light) 0%, var(--board) 100%); border: 12px solid #4a3728; border-radius: 25px; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.8); overflow: hidden; } canvas { display: block; width: 100%; height: 100%; cursor: grab; } canvas:active { cursor: grabbing; } canvas.aiming { cursor: crosshair; } .pocket { position: absolute; width: 45px; height: 45px; background: radial-gradient(circle at 30% 30%, #444, #111); border-radius: 50%; box-shadow: inset 0 0 15px #000; border: 2px solid #5d4037; z-index: 5; } .pocket.tl { top: -12px; left: -12px; } .pocket.tr { top: -12px; right: -12px; } .pocket.bl { bottom: -12px; left: -12px; } .pocket.br { bottom: -12px; right: -12px; } #power-meter { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 200px; height: 12px; background: rgba(0,0,0,0.6); border-radius: 20px; overflow: hidden; display: none; border: 2px solid var(--gold); z-index: 10; } #power-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #00ff00, #ffff00, #ff0000); transition: width 0.05s linear; } #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); color: var(--gold); padding: 20px 40px; border-radius: 50px; font-size: 1.3rem; font-weight: 700; pointer-events: none; opacity: 0; transition: all 0.3s; z-index: 20; border: 2px solid var(--gold); text-align: center; white-space: nowrap; } #msg.show { opacity: 1; transform: translate(-50%, -50%) scale(1.1); } #end-screen { position: fixed; inset: 0; background: rgba(10,14,23,0.98); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 20px; } #end-screen h1 { font-size: 3.5rem; color: var(--gold); } .connection-status { position: absolute; top: 10px; right: 10px; width: 12px; height: 12px; border-radius: 50%; background: var(--red); border: 2px solid white; z-index: 30; } .connection-status.connected { background: var(--green); } .connection-status.connecting { background: var(--gold); animation: pulse 1s infinite; } @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } } @media (max-width: 600px) { #setup h1 { font-size: 2rem; } .code-display { font-size: 1.5rem; padding: 15px 30px; letter-spacing: 5px; } #game-ui { font-size: 11px; padding: 10px; } .player-badge { padding: 8px 12px; font-size: 0.8rem; } } </style> <base target="_blank"> </head> <body> <div id="setup"> <h1>🎯 Carrom Pro</h1> <div id="my-id"><span class="spinner"></span> Connecting...</div> <div style="margin-top: 20px;"> <input type="text" id="join-id" placeholder="Enter Code" disabled> <button class="btn" id="join-btn" onclick="connect()" disabled style="margin-left: 10px;">JOIN</button> </div> <button class="btn secondary" onclick="startSolo()">Practice Solo</button> </div> <div id="end-screen"> <h1 id="end-title">🏆 VICTORY!</h1> <div style="font-size: 1.5rem; color: white;"> <span id="final-white">White: 0</span> - <span id="final-black">Black: 0</span> </div> <button class="btn" onclick="location.reload()">PLAY AGAIN</button> </div> <div id="game-ui"> <div class="player-badge white" id="badge-white">⚪ YOU: 0</div> <div id="turn-indicator" class="waiting">WAITING...</div> <div class="player-badge black" id="badge-black">⚫ OPP: 0</div> </div> <div id="game-container"> <div id="board"> <div class="connection-status" id="conn-status"></div> <div class="pocket tl"></div> <div class="pocket tr"></div> <div class="pocket bl"></div> <div class="pocket br"></div> <canvas id="gameCanvas"></canvas> <div id="power-meter"><div id="power-fill"></div></div> <div id="msg"></div> </div> </div> <script> // ==================== CUSTOM PHYSICS ENGINE ==================== const PHYSICS = { BOARD_SIZE: 500, PIECE_RADIUS: 9, QUEEN_RADIUS: 9.5, STRIKER_RADIUS: 14, POCKET_RADIUS: 22, FRICTION: 0.985, RESTITUTION: 0.85, WALL_RESTITUTION: 0.7, SUB_STEPS: 8, MAX_POWER: 15, BASELINE_Y_WHITE: 430, BASELINE_Y_BLACK: 70, WIN_SCORE: 9 }; class Vector2 { constructor(x = 0, y = 0) { this.x = x; this.y = y; } add(v) { return new Vector2(this.x + v.x, this.y + v.y); } sub(v) { return new Vector2(this.x - v.x, this.y - v.y); } mult(s) { return new Vector2(this.x * s, this.y * s); } mag() { return Math.sqrt(this.x * this.x + this.y * this.y); } normalize() { const m = this.mag(); return m > 0 ? new Vector2(this.x / m, this.y / m) : new Vector2(0, 0); } dist(v) { return Math.sqrt((this.x - v.x) ** 2 + (this.y - v.y) ** 2); } copy() { return new Vector2(this.x, this.y); } } class Body { constructor(x, y, radius, mass, label) { this.pos = new Vector2(x, y); this.vel = new Vector2(0, 0); this.radius = radius; this.mass = mass; this.label = label; this.active = true; this.id = Math.random().toString(36).substr(2, 9); } isMoving() { return this.vel.mag() > 0.1; } update() { if (!this.active) return; const dt = 1 / PHYSICS.SUB_STEPS; for (let i = 0; i < PHYSICS.SUB_STEPS; i++) { this.pos = this.pos.add(this.vel.mult(dt)); } this.vel = this.vel.mult(PHYSICS.FRICTION); if (this.vel.mag() < 0.05) { this.vel = new Vector2(0, 0); } } } class PhysicsWorld { constructor() { this.bodies = []; this.pockets = [ new Vector2(30, 30), new Vector2(470, 30), new Vector2(30, 470), new Vector2(470, 470) ]; this.walls = { left: 25, right: 475, top: 25, bottom: 475 }; } addBody(body) { this.bodies.push(body); return body; } removeBody(body) { body.active = false; this.bodies = this.bodies.filter(b => b !== body); } step() { this.bodies.forEach(b => b.update()); for (let iter = 0; iter < 3; iter++) { this.checkCollisions(); } this.checkWalls(); } checkCollisions() { for (let i = 0; i < this.bodies.length; i++) { for (let j = i + 1; j < this.bodies.length; j++) { const a = this.bodies[i]; const b = this.bodies[j]; if (!a.active || !b.active) continue; const dist = a.pos.dist(b.pos); const minDist = a.radius + b.radius; if (dist < minDist && dist > 0) { this.resolveCollision(a, b, dist, minDist); } } } } resolveCollision(a, b, dist, minDist) { const n = new Vector2(b.pos.x - a.pos.x, b.pos.y - a.pos.y).normalize(); const relVel = new Vector2(a.vel.x - b.vel.x, a.vel.y - b.vel.y); const velAlongNormal = relVel.x * n.x + relVel.y * n.y; if (velAlongNormal > 0) return; let j = -(1 + PHYSICS.RESTITUTION) * velAlongNormal; j /= (1 / a.mass + 1 / b.mass); const impulse = n.mult(j); a.vel = a.vel.add(impulse.mult(1 / a.mass)); b.vel = b.vel.sub(impulse.mult(1 / b.mass)); const percent = 0.8; const slop = 0.01; const penetration = minDist - dist; if (penetration > slop) { const correction = n.mult((penetration / (1 / a.mass + 1 / b.mass)) * percent); a.pos = a.pos.sub(correction.mult(1 / a.mass)); b.pos = b.pos.add(correction.mult(1 / b.mass)); } } checkWalls() { this.bodies.forEach(b => { if (!b.active) return; if (b.pos.x - b.radius < this.walls.left) { b.pos.x = this.walls.left + b.radius; b.vel.x *= -PHYSICS.WALL_RESTITUTION; } else if (b.pos.x + b.radius > this.walls.right) { b.pos.x = this.walls.right - b.radius; b.vel.x *= -PHYSICS.WALL_RESTITUTION; } if (b.pos.y - b.radius < this.walls.top) { b.pos.y = this.walls.top + b.radius; b.vel.y *= -PHYSICS.WALL_RESTITUTION; } else if (b.pos.y + b.radius > this.walls.bottom) { b.pos.y = this.walls.bottom - b.radius; b.vel.y *= -PHYSICS.WALL_RESTITUTION; } }); } checkPockets() { const pocketed = []; this.bodies.forEach(b => { if (!b.active) return; for (let pocket of this.pockets) { if (b.pos.dist(pocket) < PHYSICS.POCKET_RADIUS - 2) { pocketed.push(b); break; } } }); return pocketed; } } // ==================== GAME LOGIC ==================== const state = { game: null, peer: null, conn: null, myId: null, isHost: false, isSolo: false, myColor: null, gameActive: false, lastPocketed: [] }; class CarromGame { constructor() { this.world = new PhysicsWorld(); this.striker = null; this.pieces = []; this.scores = { white: 0, black: 0 }; this.currentPlayer = 'white'; this.gameActive = false; this.turnInProgress = false; this.strikerPos = new Vector2(250, PHYSICS.BASELINE_Y_WHITE); } initBoard() { this.world.bodies = []; this.pieces = []; const cx = PHYSICS.BOARD_SIZE / 2; const cy = PHYSICS.BOARD_SIZE / 2; const queen = new Body(cx, cy, PHYSICS.QUEEN_RADIUS, 1, 'queen'); this.world.addBody(queen); this.pieces.push(queen); for (let i = 0; i < 6; i++) { const angle = (i / 6) * Math.PI * 2; const x = cx + Math.cos(angle) * 28; const y = cy + Math.sin(angle) * 28; const label = i % 2 === 0 ? 'white' : 'black'; const piece = new Body(x, y, PHYSICS.PIECE_RADIUS, 1, label); this.world.addBody(piece); this.pieces.push(piece); } for (let i = 0; i < 12; i++) { const angle = (i / 12) * Math.PI * 2 + Math.PI / 12; const x = cx + Math.cos(angle) * 52; const y = cy + Math.sin(angle) * 52; const label = i % 2 === 0 ? 'black' : 'white'; const piece = new Body(x, y, PHYSICS.PIECE_RADIUS, 1, label); this.world.addBody(piece); this.pieces.push(piece); } this.resetStriker(); } resetStriker() { if (this.striker) { this.world.removeBody(this.striker); } const y = this.currentPlayer === 'white' ? PHYSICS.BASELINE_Y_WHITE : PHYSICS.BASELINE_Y_BLACK; this.strikerPos = new Vector2(250, y); this.striker = new Body(250, y, PHYSICS.STRIKER_RADIUS, 2, 'striker'); this.world.addBody(this.striker); } placeStriker(x) { const minX = 50 + PHYSICS.STRIKER_RADIUS; const maxX = 450 - PHYSICS.STRIKER_RADIUS; x = Math.max(minX, Math.min(maxX, x)); const y = this.currentPlayer === 'white' ? PHYSICS.BASELINE_Y_WHITE : PHYSICS.BASELINE_Y_BLACK; this.strikerPos = new Vector2(x, y); if (this.striker) { this.striker.pos = new Vector2(x, y); this.striker.vel = new Vector2(0, 0); } } shoot(angle, power) { if (!this.striker || this.turnInProgress) return false; power = Math.min(power, PHYSICS.MAX_POWER); this.striker.vel = new Vector2( Math.cos(angle) * power, Math.sin(angle) * power ); this.turnInProgress = true; return true; } update() { if (!this.gameActive) return; this.world.step(); const pocketed = this.world.checkPockets(); pocketed.forEach(body => { this.world.removeBody(body); if (body === this.striker) { this.striker = null; } else { this.pieces = this.pieces.filter(p => p !== body); } }); return pocketed; } checkTurnEnd() { const allStopped = this.world.bodies.every(b => !b.isMoving()); return allStopped && this.turnInProgress; } processTurn(pocketedBodies) { let myPieces = 0; let opponentPieces = 0; let queenPocketed = false; let strikerPocketed = !this.striker; pocketedBodies.forEach(b => { if (b.label === this.currentPlayer) { myPieces++; this.scores[this.currentPlayer]++; } else if (b.label === 'queen') { queenPocketed = true; } else if (b.label !== 'striker') { opponentPieces++; } }); if (strikerPocketed) { if (this.scores[this.currentPlayer] > 0) { this.scores[this.currentPlayer]--; } } let queenReturned = false; if (queenPocketed) { if (myPieces > 0) { this.scores[this.currentPlayer] += 5; } else { setTimeout(() => { const queen = new Body(250, 250, PHYSICS.QUEEN_RADIUS, 1, 'queen'); this.world.addBody(queen); this.pieces.push(queen); }, 500); queenReturned = true; } } const foul = strikerPocketed || opponentPieces > 0; const continueTurn = !foul && myPieces > 0 && !queenReturned; if (!continueTurn) { this.currentPlayer = this.currentPlayer === 'white' ? 'black' : 'white'; } this.turnInProgress = false; this.resetStriker(); return { continueTurn, strikerPocketed, queenPocketed, myPieces, opponentPieces, scores: { ...this.scores }, nextPlayer: this.currentPlayer }; } checkWin() { if (this.scores.white >= PHYSICS.WIN_SCORE) return 'white'; if (this.scores.black >= PHYSICS.WIN_SCORE) return 'black'; return null; } } // ==================== NETWORKING (POOL-STYLE - WORKING) ==================== function initPeer() { const randomId = Math.floor(1000 + Math.random() * 9000).toString(); state.peer = new Peer(randomId, { config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] } }); // Timeout fallback like pool.html setTimeout(() => { if (!state.myId) { document.getElementById('my-id').innerHTML = '<span style="color:#ff6666">Timeout - Use Practice Mode</span>'; } }, 15000); state.peer.on('open', id => { state.myId = id; document.getElementById('my-id').innerHTML = ` <div class="code-display">${id}</div> <button class="copy-btn" onclick="navigator.clipboard.writeText('${id}')">Copy</button> `; document.getElementById('join-id').disabled = false; document.getElementById('join-btn').disabled = false; }); state.peer.on('connection', conn => { state.isHost = true; state.myColor = 'white'; setupConn(conn); startGame(); }); } function connect() { const id = document.getElementById('join-id').value.trim(); if (!id || id.length !== 4) return alert('Enter 4-digit code'); state.isHost = false; state.myColor = 'black'; const conn = state.peer.connect(id, { reliable: true }); document.getElementById('my-id').innerHTML = '<span class="spinner"></span> Connecting...'; setupConn(conn); } function setupConn(conn) { state.conn = conn; conn.on('open', () => { if (!state.isHost) startGame(); }); conn.on('data', data => { if (data.type === 'TURN_PASS') { state.game.scores = data.scores; state.game.currentPlayer = data.nextPlayer; state.game.turnInProgress = false; state.game.resetStriker(); updateUI(); showMessage(data.continueTurn ? '⚡ Opponent continues' : '🎯 Your turn!'); } else if (data.type === 'SHOT' && state.game.striker) { state.game.shoot(data.angle, data.power); updateUI(); } else if (data.type === 'STRIKER_POS') { if (state.game && state.game.striker && state.game.currentPlayer !== state.myColor) { state.game.placeStriker(data.x); } } }); } // ==================== RENDERING ==================== class Renderer { constructor(canvas, game) { this.canvas = canvas; this.ctx = canvas.getContext('2d'); this.game = game; this.scale = 1; this.resize(); window.addEventListener('resize', () => this.resize()); } resize() { const rect = this.canvas.parentElement.getBoundingClientRect(); this.canvas.width = rect.width - 6; this.canvas.height = rect.height - 6; this.scale = this.canvas.width / PHYSICS.BOARD_SIZE; } worldToScreen(pos) { return new Vector2(pos.x * this.scale, pos.y * this.scale); } screenToWorld(x, y) { const rect = this.canvas.getBoundingClientRect(); return new Vector2( (x - rect.left) / this.scale, (y - rect.top) / this.scale ); } draw() { const ctx = this.ctx; const w = this.canvas.width; ctx.clearRect(0, 0, w, w); const grad = ctx.createRadialGradient(w/2, w/2, 0, w/2, w/2, w/2); grad.addColorStop(0, '#3d7020'); grad.addColorStop(1, '#1e3a12'); ctx.fillStyle = grad; ctx.fillRect(0, 0, w, w); ctx.strokeStyle = 'rgba(255,215,0,0.3)'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(w/2, w/2, 45 * this.scale, 0, Math.PI * 2); ctx.stroke(); ctx.strokeStyle = 'rgba(255,215,0,0.6)'; ctx.lineWidth = 3; const whiteY = PHYSICS.BASELINE_Y_WHITE * this.scale; ctx.beginPath(); ctx.moveTo(30 * this.scale, whiteY); ctx.lineTo(470 * this.scale, whiteY); ctx.stroke(); const blackY = PHYSICS.BASELINE_Y_BLACK * this.scale; ctx.beginPath(); ctx.moveTo(30 * this.scale, blackY); ctx.lineTo(470 * this.scale, blackY); ctx.stroke(); this.game.world.bodies.forEach(body => { if (!body.active) return; this.drawBody(body); }); } drawBody(body) { const ctx = this.ctx; const pos = this.worldToScreen(body.pos); const r = body.radius * this.scale; ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.arc(pos.x + 2, pos.y + 2, r, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2); if (body.label === 'striker') { const grad = ctx.createRadialGradient(pos.x - 3, pos.y - 3, 0, pos.x, pos.y, r); grad.addColorStop(0, '#ffffff'); grad.addColorStop(1, '#cccccc'); ctx.fillStyle = grad; ctx.fill(); ctx.strokeStyle = '#999'; ctx.lineWidth = 1; ctx.stroke(); } else if (body.label === 'white') { const grad = ctx.createRadialGradient(pos.x - 2, pos.y - 2, 0, pos.x, pos.y, r); grad.addColorStop(0, '#ffffff'); grad.addColorStop(1, '#dddddd'); ctx.fillStyle = grad; ctx.fill(); } else if (body.label === 'black') { const grad = ctx.createRadialGradient(pos.x - 2, pos.y - 2, 0, pos.x, pos.y, r); grad.addColorStop(0, '#444444'); grad.addColorStop(1, '#111111'); ctx.fillStyle = grad; ctx.fill(); } else if (body.label === 'queen') { const grad = ctx.createRadialGradient(pos.x - 2, pos.y - 2, 0, pos.x, pos.y, r); grad.addColorStop(0, '#ff5555'); grad.addColorStop(1, '#990000'); ctx.fillStyle = grad; ctx.fill(); ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2; ctx.stroke(); } ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.beginPath(); ctx.arc(pos.x - r * 0.3, pos.y - r * 0.3, r * 0.25, 0, Math.PI * 2); ctx.fill(); } drawAimLine(start, end, power) { const ctx = this.ctx; const s = this.worldToScreen(start); const e = this.worldToScreen(end); const grad = ctx.createLinearGradient(s.x, s.y, e.x, e.y); grad.addColorStop(0, 'rgba(255,255,255,0.8)'); grad.addColorStop(1, `rgba(255, ${255 - power * 2}, 0, 0.5)`); ctx.strokeStyle = grad; ctx.lineWidth = 3; ctx.setLineDash([5, 5]); ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(e.x, e.y); ctx.stroke(); ctx.setLineDash([]); } } // ==================== INPUT HANDLING ==================== class InputHandler { constructor(canvas, game, renderer) { this.canvas = canvas; this.game = game; this.renderer = renderer; this.isDragging = false; this.dragStart = null; this.dragCurrent = null; this.mode = 'place'; this.setupListeners(); } setupListeners() { const c = this.canvas; c.addEventListener('mousedown', e => this.onDown(e)); c.addEventListener('touchstart', e => this.onDown(e), { passive: false }); c.addEventListener('mousemove', e => this.onMove(e)); c.addEventListener('touchmove', e => this.onMove(e), { passive: false }); c.addEventListener('mouseup', e => this.onUp(e)); c.addEventListener('touchend', e => this.onUp(e)); c.addEventListener('mouseleave', () => this.onCancel()); } getPos(e) { const rect = this.canvas.getBoundingClientRect(); let clientX, clientY; if (e.touches && e.touches.length > 0) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; } else if (e.changedTouches && e.changedTouches.length > 0) { clientX = e.changedTouches[0].clientX; clientY = e.changedTouches[0].clientY; } else { clientX = e.clientX; clientY = e.clientY; } return this.renderer.screenToWorld(clientX, clientY); } onDown(e) { e.preventDefault(); if (!this.game.gameActive || this.game.turnInProgress) return; if (this.game.currentPla his.dragStart.y - this.dragCurrent.y; const power = Math.min(Math.abs(dy) * 0.1, 100); document.getElementById('power-meter').style.display = 'block'; this.renderer.drawAimLine(this.dragStart, this.dragCurrent, power); } } } // ==================== MAIN CONTROLLER ==================== let renderer, input, animationId; function showMessage(text) { const el = document.getElementById('msg'); el.textContent = text; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 2500); } function updateUI() { const isWhite = state.myColor === 'white'; document.getElementById('badge-white').textContent = `⚪ ${isWhite ? 'YOU' : 'OPP'}: ${state.game.scores.white}`; document.getElementById('badge-black').textContent = `⚫ ${isWhite ? 'OPP' : 'YOU'}: ${state.game.scores.black}`; document.getElementById('badge-white').classList.toggle('active', state.game.currentPlayer === 'white'); document.getElementById('badge-black').classList.toggle('active', state.game.currentPlayer === 'black'); const indicator = document.getElementById('turn-indicator'); const myTurn = state.game.currentPlayer === state.myColor || state.isSolo; if (state.game.turnInProgress) { indicator.textContent = 'SHOT IN PROGRESS...'; indicator.className = 'waiting'; } else if (myTurn) { indicator.textContent = '★ YOUR TURN ★'; indicator.className = 'my-turn'; } else { indicator.textContent = "OPPONENT'S TURN"; indicator.className = 'opponent-turn'; } } function gameLoop() { if (!state.game.gameActive) return; const pocketed = state.game.update(); if (pocketed.length > 0) { state.lastPocketed = [...state.lastPocketed, ...pocketed]; } if (state.game.checkTurnEnd()) { handleTurnEnd(); } renderer.draw(); input.update(); animationId = requestAnimationFrame(gameLoop); } function handleTurnEnd() { const results = state.game.processTurn(state.lastPocketed); state.lastPocketed = []; if (results.strikerPocketed) { showMessage('⚠️ Foul! Striker pocketed (-1)'); } else if (results.queenPocketed && results.myPieces > 0
